A. The movie trailer was released online.
B. People became excited to watch the film.
C. Tickets were booked quickly.
D. The theatre became houseful.`,options:["A-B-C-D","B-A-D-C","A-C-B-D","D-C-B-A"],correctAnswer:0,difficulty:"easy",type:"para-jumble"},{id:16,question:`Arrange properly:
A. Neha entered the baking competition.
B. She prepared a chocolate cake.
C. The judges tasted her cake.
D. She won the first prize.`,options:["A-B-C-D","B-A-D-C","C-B-A-D","D-C-B-A"],correctAnswer:0,difficulty:"easy",type:"para-jumble"},{id:17,question:`Arrange the following sentences:
A. The mountaineers began climbing early.
B. The weather became colder.
C. They finally reached the peak.
D. Everyone celebrated their success.`,options:["A-B-C-D","B-A-D-C","A-C-B-D","D-C-B-A"],correctAnswer:0,difficulty:"easy",type:"para-jumble"},{id:18,question:`Choose the correct arrangement:
A. The shopkeeper arranged the products neatly.
B. Customers entered the shop.
C. Many people bought useful items.
D. The shop became crowded by evening.`,options:["A-B-C-D","B-A-D-C","C-B-A-D","D-C-B-A"],correctAnswer:0,difficulty:"easy",type:"para-jumble"},{id:19,question:`Arrange logically:
A. The students planted saplings near the school.
B. They watered the plants regularly.
C. The saplings grew into healthy trees.
D. The school campus looked greener.`,options:["A-B-C-D","B-A-D-C","A-C-B-D","D-C-B-A"],correctAnswer:0,difficulty:"easy",type:"para-jumble"},{id:20,question:`Arrange the sentences in correct order:
A. The police received information about the theft.
B. Officers reached the location quickly.
C. They investigated the matter carefully.
D. The thief was arrested later.`,options:["A-B-C-D","B-A-D-C","C-B-A-D","D-C-B-A"],correctAnswer:0,difficulty:"easy",type:"para-jumble"}],FC=[{id:1,question:"Statement: All birds can fly. Penguin is a bird. What can be concluded?",options:["Penguin can fly","Penguin cannot fly","No conclusion can be drawn","Penguin is not a bird"],correctAnswer:0,difficulty:"easy",type:"critical-reasoning",explanation:"According to the statement, all birds can fly. Since penguin is called a bird here, the logical conclusion is that penguin can fly."},{id:2,question:"If all roses are flowers and some flowers fade quickly, which statement is definitely true?",options:["All roses fade quickly","Some roses may fade quickly","No flowers fade quickly","Roses are not flowers"],correctAnswer:1,difficulty:"easy",type:"critical-reasoning",explanation:"Since some flowers fade quickly and roses are flowers, some roses may also fade quickly."},{id:3,question:"Statement: Heavy rain causes traffic jams. It rained heavily today. What is the most logical conclusion?",options:["Traffic jams may occur","There will be no traffic","Roads disappeared","Cars stopped forever"],correctAnswer:0,difficulty:"easy",type:"critical-reasoning",explanation:"The statement says heavy rain causes traffic jams, so traffic jams may occur today."},{id:4,question:"If all students study math and Riya is a student, what follows?",options:["Riya dislikes math","Riya studies math","Riya teaches math","Riya failed math"],correctAnswer:1,difficulty:"easy",type:"critical-reasoning",explanation:"All students study math. Since Riya is a student, she studies math."},{id:5,question:"Statement: Some athletes are singers. Which conclusion is correct?",options:["All athletes are singers","Some singers are athletes","No singer is an athlete","All singers are athletes"],correctAnswer:1,difficulty:"easy",type:"critical-reasoning",explanation:"If some athletes are singers, then some singers are athletes."},{id:6,question:"A clock shows 3 PM. Three hours later, what time will it show?",options:["5 PM","6 PM","7 PM","8 PM"],correctAnswer:1,difficulty:"easy",type:"critical-reasoning",explanation:"Adding 3 hours to 3 PM gives 6 PM."},{id:7,question:"If every doctor is educated and Ravi is a doctor, then Ravi is:",options:["Uneducated","Educated","A teacher","A lawyer"],correctAnswer:1,difficulty:"easy",type:"critical-reasoning",explanation:"Every doctor is educated. Ravi is a doctor, so Ravi is educated."},{id:8,question:"Statement: The ground is wet because it rained. What type of relationship is this?",options:["Cause and effect","Comparison","Contrast","Opinion"],correctAnswer:0,difficulty:"easy",type:"critical-reasoning",explanation:"Rain is the cause and the wet ground is the effect."},{id:9,question:"If all cats are animals and Tommy is a cat, what can we conclude?",options:["Tommy is an animal","Tommy is a tiger","Tommy is not an animal","Tommy can bark"],correctAnswer:0,difficulty:"easy",type:"critical-reasoning",explanation:"All cats are animals. Since Tommy is a cat, Tommy is an animal."},{id:10,question:"Statement: Some books are interesting. Which statement is valid?",options:["All books are interesting","Some interesting things are books","No books are interesting","Interesting books do not exist"],correctAnswer:1,difficulty:"easy",type:"critical-reasoning",explanation:"If some books are interesting, then some interesting things are books."},{id:11,question:"If all apples are fruits and some fruits are yellow, then:",options:["All apples are yellow","Some apples may be yellow","No apples are fruits","Fruits are vegetables"],correctAnswer:1,difficulty:"easy",type:"critical-reasoning",explanation:"Some fruits are yellow, so it is possible that some apples may also be yellow."},{id:12,question:"A train travels 60 km in one hour. How far will it travel in 2 hours?",options:["100 km","110 km","120 km","130 km"],correctAnswer:2,difficulty:"easy",type:"critical-reasoning",explanation:"60 km in 1 hour means 120 km in 2 hours."},{id:13,question:"If all teachers work in schools and Anita is a teacher, Anita works in:",options:["A hospital","A school","A bank","A mall"],correctAnswer:1,difficulty:"easy",type:"critical-reasoning",explanation:"All teachers work in schools. Anita is a teacher, so she works in a school."},{id:14,question:"Statement: The power went out because of the storm. Which is the cause?",options:["Power cut","Storm","Electricity","Darkness"],correctAnswer:1,difficulty:"easy",type:"critical-reasoning",explanation:"The storm caused the power outage."},{id:15,question:"If some cars are electric and all electric vehicles save fuel, what can be concluded?",options:["Some cars save fuel","All cars save fuel","No cars save fuel","Electric cars do not exist"],correctAnswer:0,difficulty:"easy",type:"critical-reasoning",explanation:"Some cars are electric, and electric vehicles save fuel. Therefore, some cars save fuel."},{id:16,question:"Statement: All mangoes are fruits. All fruits contain vitamins. Therefore:",options:["All mangoes contain vitamins","No mangoes contain vitamins","Only fruits contain vitamins","Mangoes are vegetables"],correctAnswer:0,difficulty:"easy",type:"critical-reasoning",explanation:"Mangoes are fruits and fruits contain vitamins, so mangoes contain vitamins."},{id:17,question:"If all laptops are electronic devices and some electronic devices are expensive, then:",options:["All laptops are expensive","Some laptops may be expensive","No laptops are expensive","Laptops are not electronic"],correctAnswer:1,difficulty:"easy",type:"critical-reasoning",explanation:"Some electronic devices are expensive, so some laptops may also be expensive."},{id:18,question:"A shopkeeper sold 5 pens for ₹50. What is the price of one pen?",options:["₹5","₹8","₹10","₹15"],correctAnswer:2,difficulty:"easy",type:"critical-reasoning",explanation:"₹50 divided by 5 pens equals ₹10 per pen."},{id:19,question:"Statement: Healthy food improves fitness. Rahul eats healthy food daily. What can be inferred?",options:["Rahul may improve his fitness","Rahul dislikes fitness","Rahul never exercises","Healthy food is harmful"],correctAnswer:0,difficulty:"easy",type:"critical-reasoning",explanation:"Healthy food improves fitness, so Rahul may improve his fitness by eating healthy food daily."},{id:20,question:"If all planets revolve around the Sun and Earth is a planet, then:",options:["Earth revolves around the Sun","Earth is the Sun","Earth does not move","Planets are stars"],correctAnswer:0,difficulty:"easy",type:"critical-reasoning",explanation:"All planets revolve around the Sun. Earth is a planet, so Earth revolves around the Sun."}],EC=[...vC,...UC,...bC,...xC,...FC];let HC=1e3;const iA=()=>HC++,SC=[{id:iA(),type:"rc",difficulty:"medium",passage:"Artificial intelligence has made remarkable strides in natural language processing and computer vision. However, AI systems still struggle with tasks that humans find trivially easy — understanding context, exercising common sense, and adapting to novel situations. This gap has led researchers to explore hybrid approaches combining neural networks with symbolic reasoning.",question:"The author suggests the solution to AI's limitations lies in:",options:["Building bigger neural networks","Abandoning neural networks","Combining different AI approaches","Focusing only on language processing"],correctAnswer:2,explanation:'The passage mentions "hybrid approaches combining neural networks with symbolic reasoning."'},{id:iA(),type:"rc",difficulty:"medium",passage:"Democracy is not merely about elections; it is about fostering debate, dissent, and dialogue. A healthy democracy requires an informed citizenry, free press, and institutions that hold power to account. The rise of populism worldwide is a symptom of the erosion of these democratic norms.",question:"According to the passage, populism is:",options:["A cause of democratic erosion","A symptom of weakening democratic norms","The solution to democratic challenges","Unrelated to democracy"],correctAnswer:1,explanation:'The passage explicitly calls populism "a symptom of the erosion of these democratic norms."'},{id:iA(),type:"rc",difficulty:"medium",passage:"The human microbiome — trillions of microorganisms living in and on our bodies — plays a crucial role in digestion, immunity, and even mental health. Recent research suggests that disruptions to the microbiome may contribute to conditions ranging from obesity to depression. This has led to growing interest in probiotics and microbiome-friendly diets.",question:"According to the passage, the microbiome may influence:",options:["Only digestion","Only immunity","Digestion, immunity, and mental health","Only mental health"],correctAnswer:2,explanation:'The passage mentions all three: "digestion, immunity, and even mental health."'},{id:iA(),type:"rc",difficulty:"medium",passage:"The Silk Road was an ancient network of trade routes connecting China to the Mediterranean. It facilitated not just commerce but also the exchange of ideas, religions, and technologies between East and West. Buddhism spread from India to China along these routes, while paper-making technology traveled from China to Europe.",question:"What was a key function of the Silk Road beyond trade?",options:["Military conquest","Cultural and intellectual exchange","Only spice trading","Political governance"],correctAnswer:1,explanation:'The passage highlights "exchange of ideas, religions, and technologies."'},{id:iA(),type:"rc",difficulty:"medium",passage:"Behavioral economics challenges the traditional economic assumption that humans always make rational decisions. Studies show that people are influenced by cognitive biases, emotions, and social pressures. Loss aversion — the tendency to prefer avoiding losses over acquiring gains — is one of the most powerful biases affecting decision-making.",question:"Loss aversion means people tend to:",options:["Prefer gains over avoiding losses","Prefer avoiding losses over acquiring gains","Treat gains and losses equally","Always make rational choices"],correctAnswer:1,explanation:'The passage defines it: "prefer[ring] avoiding losses over acquiring gains."'},{id:iA(),type:"rc",difficulty:"medium",passage:"Renewable energy sources like solar and wind power are becoming increasingly cost-competitive with fossil fuels. In many regions, solar energy is now the cheapest source of electricity. However, the intermittent nature of renewables — the sun doesn't always shine, and the wind doesn't always blow — requires advances in energy storage technology.",question:"The main challenge for renewable energy according to the passage is:",options:["Cost","Intermittency and storage","Lack of demand","Government opposition"],correctAnswer:1,explanation:'The passage identifies the "intermittent nature" and need for "advances in energy storage."'},{id:iA(),type:"vocabulary",difficulty:"medium",question:`Choose the word that best replaces the italicized word: "The politician's speech was designed to obfuscate the real issues."`,options:["Clarify","Confuse","Highlight","Resolve"],correctAnswer:1,explanation:'"Obfuscate" = to make unclear or confusing; "confuse" matches.'},{id:iA(),type:"vocabulary",difficulty:"medium",question:'"RECALCITRANT" means:',options:["Eager to please","Having an obstinate refusal to comply","Quick to understand","Prone to wandering"],correctAnswer:1,explanation:'"Recalcitrant" = uncooperative, stubbornly resistant.'},{id:iA(),type:"vocabulary",difficulty:"medium",question:'Choose the synonym of "PERTINACIOUS".',options:["Weak","Yielding","Persistent and determined","Flexible"],correctAnswer:2,explanation:'"Pertinacious" = holding firmly to a belief or course of action; tenacious.'},{id:iA(),type:"vocabulary",difficulty:"medium",question:'The word "EQUIVOCAL" means:',options:["Clear and definite","Open to more than one interpretation","Very loud","Extremely fast"],correctAnswer:1,explanation:'"Equivocal" = ambiguous, open to multiple interpretations.'},{id:iA(),type:"vocabulary",difficulty:"medium",question:'"PUSILLANIMOUS" means:',options:["Brave","Showing a lack of courage","Very strong","Intelligent"],correctAnswer:1,explanation:'"Pusillanimous" = timid, showing a lack of courage or determination.'},{id:iA(),type:"vocabulary",difficulty:"medium",question:'Choose the antonym of "LOQUACIOUS".',options:["Talkative","Reticent","Verbose","Garrulous"],correctAnswer:1,explanation:'"Loquacious" = talkative. "Reticent" = reserved, not revealing much — the opposite.'},{id:iA(),type:"vocabulary",difficulty:"medium",question:'"MAGNANIMOUS" is closest in meaning to:',options:["Petty","Generous and forgiving","Small-minded","Aggressive"],correctAnswer:1,explanation:'"Magnanimous" = very generous or forgiving, especially toward rivals.'},{id:iA(),type:"vocabulary",difficulty:"medium",question:'Choose the synonym of "DELETERIOUS".',options:["Beneficial","Harmful","Beautiful","Delightful"],correctAnswer:1,explanation:'"Deleterious" = causing harm or damage.'},{id:iA(),type:"vocabulary",difficulty:"medium",question:'"CAPRICIOUS" means:',options:["Consistent","Given to sudden changes of mood","Careful","Ancient"],correctAnswer:1,explanation:'"Capricious" = given to sudden and unaccountable changes of mood.'},{id:iA(),type:"fill-in-blanks",difficulty:"medium",question:"The diplomat's ______ response helped diffuse the tension.",options:["Tactless","Tactful","Hasty","Indifferent"],correctAnswer:1,explanation:'"Tactful" = having sensitivity in dealing with others.'},{id:iA(),type:"fill-in-blanks",difficulty:"medium",question:"The scientist's theory was eventually ______ by the academic community after peer review.",options:["Refuted","Vindicated","Dismissed","Questioned"],correctAnswer:1,explanation:'"Vindicated" = shown to be right or reasonable.'},{id:iA(),type:"fill-in-blanks",difficulty:"medium",question:"The CEO's ______ leadership style inspired confidence in all employees.",options:["Vacillating","Resolute","Timid","Confused"],correctAnswer:1,explanation:'"Resolute" = admirably purposeful and determined.'},{id:iA(),type:"fill-in-blanks",difficulty:"medium",question:"The artist was known for her ______ attention to detail in every painting.",options:["Sloppy","Meticulous","Casual","Careless"],correctAnswer:1,explanation:'"Meticulous" = showing great attention to detail; very careful.'},{id:iA(),type:"fill-in-blanks",difficulty:"medium",question:"Despite being a ______ speaker, she preferred listening to others.",options:["Loquacious","Laconic","Reticent","Taciturn"],correctAnswer:0,explanation:'The contrast "despite" suggests she talks a lot (loquacious) but preferred listening.'},{id:iA(),type:"sentence-correction",difficulty:"medium",question:"Identify the correct sentence:",options:["If I was rich, I would buy a yacht.","If I were rich, I would buy a yacht.","If I am rich, I would buy a yacht.","If I had been rich, I will buy a yacht."],correctAnswer:1,explanation:'Second conditional (hypothetical) uses "were" for all subjects.'},{id:iA(),type:"sentence-correction",difficulty:"medium",question:"Choose the correct sentence:",options:["The number of students are increasing.","The number of students is increasing.","A number of students is increasing.","The numbers of students are increasing."],correctAnswer:1,explanation:'"The number of" is singular → "is". (Note: "a number of" would be plural.)'},{id:iA(),type:"sentence-correction",difficulty:"medium",question:'Which sentence uses "affect" and "effect" correctly?',options:["The effect of the policy affected everyone.","The affect of the policy effected everyone.","The effect of the policy effected everyone.","The affect of the policy affected everyone."],correctAnswer:0,explanation:'"Effect" (noun) = result. "Affect" (verb) = to influence.'},{id:iA(),type:"grammar",difficulty:"medium",question:'Which sentence correctly uses "fewer" vs "less"?',options:["There are less students today.","There are fewer students today.","There is fewer water today.","There are less water today."],correctAnswer:1,explanation:'"Fewer" for countable nouns (students). "Less" for uncountable nouns.'},{id:iA(),type:"grammar",difficulty:"medium",question:"Choose the correct sentence:",options:["Between you and I, this is a secret.","Between you and me, this is a secret.","Between you and myself, this is a secret.","Between you and mine, this is a secret."],correctAnswer:1,explanation:'Preposition "between" requires object pronouns: "you and me."'},{id:iA(),type:"grammar",difficulty:"medium",question:'Which is the correct indirect speech? He said, "I have been working here for two years."',options:["He said he has been working there for two years.","He said he had been working there for two years.","He said he was working here for two years.","He said he is working there for two years."],correctAnswer:1,explanation:"Present perfect continuous → past perfect continuous in reported speech."},{id:iA(),type:"critical-reasoning",difficulty:"medium",question:'"All birds can fly. Penguins are birds. Therefore, penguins can fly." What is the logical flaw?',options:["The conclusion doesn't follow.","The first premise is false.","The second premise is false.","No flaw exists."],correctAnswer:1,explanation:'The first premise "All birds can fly" is factually incorrect.'},{id:iA(),type:"critical-reasoning",difficulty:"medium",question:"A study found breakfast-eaters score higher on tests. A newspaper concluded breakfast causes better scores. Which assumption does this depend on?",options:["All students eat the same breakfast.","No other factor causes both breakfast-eating and higher scores.","Students who skip breakfast are lazy.","Teachers prefer breakfast-eaters."],correctAnswer:1,explanation:"The conclusion assumes no confounding variable explains both."},{id:iA(),type:"critical-reasoning",difficulty:"medium",question:'"If it rains, the ground gets wet. The ground is wet. Therefore, it rained." This is an example of:',options:["Valid deduction","Affirming the consequent (fallacy)","Denying the antecedent","Modus ponens"],correctAnswer:1,explanation:"Affirming the consequent is a logical fallacy — the ground could be wet for other reasons."},{id:iA(),type:"critical-reasoning",difficulty:"medium",question:"Company profits rose after hiring a new manager. The CEO credited the manager. What weakens this?",options:["The manager has an MBA.","A major competitor went bankrupt during the same period.","Employees like the manager.","The manager works long hours."],correctAnswer:1,explanation:"The competitor going bankrupt offers an alternative explanation for increased profits."},{id:iA(),type:"critical-reasoning",difficulty:"medium",question:`"Either it's raining or it's sunny. It's not raining. Therefore, it's sunny." This is an example of:`,options:["False dilemma","Disjunctive syllogism (valid)","Circular reasoning","Ad hominem"],correctAnswer:1,explanation:"Disjunctive syllogism: if A or B, and not A, then B. This is valid."},{id:iA(),type:"para-jumble",difficulty:"medium",question:`Arrange:
A. However, this growth has come at a cost.
B. India's GDP has been growing steadily.
C. Environmental concerns have been largely ignored.
D. Industrial expansion has accelerated significantly.`,options:["B-D-A-C","B-A-D-C","D-B-A-C","A-B-D-C"],correctAnswer:0,explanation:"GDP growth (B) → industrial expansion (D) → caveat (A) → specific concern (C)."},{id:iA(),type:"para-jumble",difficulty:"medium",question:`Arrange:
A. However, social media also enables rapid information sharing.
B. Social media has transformed modern communication.
C. Critics argue it has reduced face-to-face interaction.
D. Its impact on society remains debated.`,options:["B-C-A-D","B-A-C-D","C-B-A-D","D-B-C-A"],correctAnswer:0,explanation:"Introduction (B) → criticism (C) → counterpoint (A) → conclusion (D)."},{id:iA(),type:"para-jumble",difficulty:"medium",question:`Arrange:
A. The match went into overtime.
B. Both teams played exceptionally well.
C. The scores were tied at the end of regulation time.
D. Finally, the home team scored the winning goal.`,options:["B-C-A-D","A-B-C-D","C-B-A-D","B-A-C-D"],correctAnswer:0,explanation:"Both played well (B) → scores tied (C) → overtime (A) → winning goal (D)."},{id:iA(),type:"rc",difficulty:"medium",passage:"Urban farming is gaining popularity in cities worldwide. From rooftop gardens to vertical farms, urban agriculture provides fresh produce to city dwellers while reducing the carbon footprint of food transportation. Critics point out that urban farms cannot produce enough to feed entire cities, but proponents argue that even small contributions to local food security are valuable.",question:"Proponents of urban farming argue that:",options:["It can feed entire cities","Even small contributions to food security are valuable","It should replace rural farming","It is cheaper than traditional farming"],correctAnswer:1,explanation:'Proponents argue "even small contributions to local food security are valuable."'},{id:iA(),type:"rc",difficulty:"medium",passage:"The placebo effect — where patients improve after receiving a fake treatment — demonstrates the powerful connection between mind and body. Studies show that placebos can reduce pain, lower blood pressure, and even ease symptoms of depression. The effect is stronger when patients believe they are receiving real treatment and when the placebo ritual is more elaborate.",question:"What strengthens the placebo effect according to the passage?",options:["Using expensive drugs","Patient belief and elaborate treatment rituals","Having more doctors present","Longer hospital stays"],correctAnswer:1,explanation:'The effect is "stronger when patients believe" and "when the placebo ritual is more elaborate."'},{id:iA(),type:"vocabulary",difficulty:"medium",question:'"SANGUINE" means:',options:["Pessimistic","Optimistic in a difficult situation","Blood-red","Angry"],correctAnswer:1,explanation:'"Sanguine" = optimistic, especially in a difficult situation.'},{id:iA(),type:"vocabulary",difficulty:"medium",question:'Choose the antonym of "MUNDANE".',options:["Ordinary","Extraordinary","Boring","Routine"],correctAnswer:1,explanation:'"Mundane" = ordinary, dull. "Extraordinary" is the opposite.'},{id:iA(),type:"vocabulary",difficulty:"medium",question:'"PROFLIGATE" means:',options:["Frugal","Recklessly extravagant","Careful with money","Generous"],correctAnswer:1,explanation:'"Profligate" = recklessly extravagant or wasteful.'},{id:iA(),type:"fill-in-blanks",difficulty:"medium",question:"The new evidence ______ the defendant's claim of innocence.",options:["Contradicted","Supported","Ignored","Questioned"],correctAnswer:0,explanation:'"Contradicted" = went against. In legal context, evidence contradicts claims.'},{id:iA(),type:"fill-in-blanks",difficulty:"medium",question:"The professor's explanation was so ______ that even beginners could grasp the concept.",options:["Obscure","Lucid","Confusing","Vague"],correctAnswer:1,explanation:'"Lucid" = expressed clearly; easy to understand.'},{id:iA(),type:"fill-in-blanks",difficulty:"medium",question:"The CEO ______ between two strategies before finally choosing one.",options:["Decided","Vacillated","Committed","Abandoned"],correctAnswer:1,explanation:'"Vacillated" = wavered between different opinions; hesitated.'},{id:iA(),type:"grammar",difficulty:"medium",question:"Which sentence correctly uses a relative pronoun?",options:["The man which called you left a message.","The man who called you left a message.","The man whom called you left a message.","The man whose called you left a message."],correctAnswer:1,explanation:'"Who" is the subject relative pronoun for people.'},{id:iA(),type:"grammar",difficulty:"medium",question:"Choose the correct sentence:",options:["He insisted on to go home early.","He insisted on going home early.","He insisted to going home early.","He insisted on go home early."],correctAnswer:1,explanation:'"Insist on" is followed by a gerund (-ing form).'},{id:iA(),type:"critical-reasoning",difficulty:"medium",question:`A politician says: "My opponent's tax plan will destroy the economy." This is an example of:`,options:["Logical reasoning","Loaded language / appeal to fear","Statistical evidence","Modus ponens"],correctAnswer:1,explanation:'"Destroy" is loaded language designed to provoke fear rather than provide evidence.'},{id:iA(),type:"para-jumble",difficulty:"medium",question:`Arrange:
A. The discovery of penicillin changed medicine forever.
B. Alexander Fleming noticed mold killing bacteria in his lab.
C. This accidental discovery in 1928 led to modern antibiotics.
D. Before this, even minor infections could be fatal.`,options:["B-A-C-D","D-B-A-C","B-C-A-D","D-A-B-C"],correctAnswer:1,explanation:"Context (D: infections were fatal) → discovery (B) → impact (A) → consequence (C)."},{id:iA(),type:"rc",difficulty:"medium",passage:"Sleep is essential for cognitive function. During sleep, the brain consolidates memories, clears waste products, and repairs neural connections. Chronic sleep deprivation has been linked to impaired judgment, weakened immunity, and increased risk of heart disease. Despite this, many adults consistently get less than the recommended 7-9 hours.",question:"According to the passage, during sleep the brain:",options:["Shuts down completely","Consolidates memories and repairs neural connections","Only rests","Stops all activity"],correctAnswer:1,explanation:'The passage lists: "consolidates memories, clears waste products, and repairs neural connections."'},{id:iA(),type:"rc",difficulty:"medium",passage:"Minimalism as a lifestyle movement advocates owning fewer possessions and focusing on what truly adds value to life. Proponents argue that reducing clutter — both physical and mental — leads to greater happiness and clarity. Critics contend that minimalism is a privilege that only the affluent can afford, as it often involves discarding items that others might need.",question:"Critics of minimalism argue that it is:",options:["Environmentally harmful","A privilege of the affluent","Too difficult to practice","Mentally unhealthy"],correctAnswer:1,explanation:'Critics say "minimalism is a privilege that only the affluent can afford."'},{id:iA(),type:"vocabulary",difficulty:"medium",question:'"PERFUNCTORY" means:',options:["Thorough and careful","Carried out with minimum effort","Enthusiastic","Repeated many times"],correctAnswer:1,explanation:'"Perfunctory" = carried out with a minimum of effort or reflection.'},{id:iA(),type:"fill-in-blanks",difficulty:"medium",question:"The novel's plot was so ______ that readers couldn't predict the ending.",options:["Predictable","Intricate","Simple","Transparent"],correctAnswer:1,explanation:'"Intricate" = complicated, detailed — making it hard to predict.'},{id:iA(),type:"fill-in-blanks",difficulty:"medium",question:"The witness gave a ______ account of the events, leaving no room for doubt.",options:["Vague","Ambiguous","Cogent","Dubious"],correctAnswer:2,explanation:'"Cogent" = clear, logical, and convincing.'},{id:iA(),type:"sentence-correction",difficulty:"medium",question:"Which sentence is correct?",options:["Not only she is talented, but also hardworking.","She is not only talented but also hardworking.","She is not only talented, but also she is hardworking.","Not only talented she is, but hardworking also."],correctAnswer:1,explanation:'"Not only...but also" should balance parallel elements: "talented" and "hardworking."'},{id:iA(),type:"critical-reasoning",difficulty:"medium",question:'"80% of dentists recommend this toothpaste." This statistic may be misleading because:',options:["Dentists are always right.","The question asked to dentists may have been leading.","Toothpaste is always good.","80% is a high number."],correctAnswer:1,explanation:'Without knowing the exact question asked, "80% recommend" could be from a leading question like "Would you recommend this or nothing?"'},{id:iA(),type:"grammar",difficulty:"medium",question:"Choose the correct sentence:",options:["I look forward to meet you.","I look forward to meeting you.","I look forward meeting you.","I look forward to met you."],correctAnswer:1,explanation:'"Look forward to" + gerund (-ing form). The "to" is a preposition here, not an infinitive marker.'}];let TC=2e3;const uA=()=>TC++,DC=[{id:uA(),type:"rc",difficulty:"hard",passage:'The concept of "cultural capital," introduced by Pierre Bourdieu, refers to non-financial social assets that promote social mobility. These include education, intellect, style of speech, and dress. Bourdieu argued that cultural capital reproduces social inequality across generations. Children from privileged backgrounds inherit cultural competencies that the education system rewards, perpetuating their advantage. This challenges the meritocratic notion that success is solely the result of individual talent.',question:"Bourdieu's theory primarily challenges which assumption?",options:["That wealth determines social status.","That education can reduce inequality.","That success is purely based on individual merit.","That cultural knowledge is inherited genetically."],correctAnswer:2,explanation:'The passage explicitly challenges "the meritocratic notion that success is solely the result of individual talent."'},{id:uA(),type:"rc",difficulty:"hard",passage:"Neuroplasticity — the brain's ability to reorganize itself by forming new neural connections — has overturned the belief that the adult brain is fixed. Research shows that learning, recovery from injury, and meditation can alter brain structure. However, neuroplasticity is a double-edged sword: just as the brain can be shaped by positive experiences, it can equally be molded by negative ones. Chronic stress reinforces neural pathways that perpetuate anxiety.",question:'The "double-edged sword" metaphor emphasizes that neuroplasticity:',options:["Is both helpful and harmful depending on context.","Can only be studied with advanced technology.","Is not fully understood.","Is more beneficial than harmful."],correctAnswer:0,explanation:"The metaphor shows neuroplasticity works both ways — positive changes but also negative reinforcement."},{id:uA(),type:"rc",difficulty:"hard",passage:`The "tragedy of the commons" describes individuals acting rationally in their own self-interest while depleting a shared resource. Garrett Hardin's example was herders sharing a common pasture: each benefits from adding cattle, but overgrazing costs are shared by all. Hardin argued for privatization or government regulation. Elinor Ostrom challenged this by showing communities can self-organize to manage shared resources when certain design principles are in place.`,question:"Ostrom's contribution was showing:",options:["Hardin's tragedy never occurs.","Government regulation is always best.","A third alternative between privatization and regulation.","Privatization is superior."],correctAnswer:2,explanation:"Ostrom showed communities can self-organize — a third way beyond privatization vs regulation."},{id:uA(),type:"rc",difficulty:"hard",passage:"The Dunning-Kruger effect is a cognitive bias where people with limited competence in a domain overestimate their abilities. Conversely, highly skilled individuals tend to underestimate their relative competence, assuming others share their knowledge. This effect has profound implications for education, management, and democratic decision-making, as it suggests that the least knowledgeable are often the most confident in their opinions.",question:"According to the passage, a key implication of the Dunning-Kruger effect is:",options:["Everyone accurately knows their skill level.","The least knowledgeable are often the most confident.","Highly skilled people are always overconfident.","Education has no effect on self-awareness."],correctAnswer:1,explanation:'The passage states: "the least knowledgeable are often the most confident in their opinions."'},{id:uA(),type:"rc",difficulty:"hard",passage:"The Anthropocene is a proposed geological epoch defined by significant human impact on Earth's geology and ecosystems. Scientists debate its starting point — some argue it began with the Industrial Revolution, others with the first nuclear tests in the 1940s. Regardless of the date, the concept highlights that humanity has become a geological force, altering climate, biodiversity, and even the composition of rocks that will form in the future.",question:"The key debate about the Anthropocene is:",options:["Whether humans affect the Earth.","When it began.","Whether it is real.","Who named it."],correctAnswer:1,explanation:'The passage says "Scientists debate its starting point" — the key debate is when it began.'},{id:uA(),type:"para-jumble",difficulty:"hard",question:`Arrange:

B. People tend to seek information that confirms their existing beliefs.
C. The scientific method was designed in part to counteract this tendency.
D. They simultaneously avoid evidence that contradicts those beliefs.`,options:["A-B-D-C","B-D-A-C","B-A-D-C","A-D-B-C"],correctAnswer:1,explanation:"Seek confirming info (B) → avoid contradicting info (D) → name it (A) → solution (C)."},{id:uA(),type:"para-jumble",difficulty:"hard",question:`Arrange:
