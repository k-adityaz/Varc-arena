D. The thief was arrested later.`,options:["A-B-C-D","B-A-D-C","C-B-A-D","D-C-B-A"],correctAnswer:0,difficulty:"easy",type:"para-jumble"}],vQ=[{id:1,question:"Statement: All birds can fly. Penguin is a bird. What can be concluded?",options:["Penguin can fly","Penguin cannot fly","No conclusion can be drawn","Penguin is not a bird"],correctAnswer:0,difficulty:"easy",type:"critical-reasoning",explanation:"According to the statement, all birds can fly. Since penguin is called a bird here, the logical conclusion is that penguin can fly."},{id:2,question:"If all roses are flowers and some flowers fade quickly, which statement is definitely true?",options:["All roses fade quickly","Some roses may fade quickly","No flowers fade quickly","Roses are not flowers"],correctAnswer:1,difficulty:"easy",type:"critical-reasoning",explanation:"Since some flowers fade quickly and roses are flowers, some roses may also fade quickly."},{id:3,question:"Statement: Heavy rain causes traffic jams. It rained heavily today. What is the most logical conclusion?",options:["Traffic jams may occur","There will be no traffic","Roads disappeared","Cars stopped forever"],correctAnswer:0,difficulty:"easy",type:"critical-reasoning",explanation:"The statement says heavy rain causes traffic jams, so traffic jams may occur today."},{id:4,question:"If all students study math and Riya is a student, what follows?",options:["Riya dislikes math","Riya studies math","Riya teaches math","Riya failed math"],correctAnswer:1,difficulty:"easy",type:"critical-reasoning",explanation:"All students study math. Since Riya is a student, she studies math."},{id:5,question:"Statement: Some athletes are singers. Which conclusion is correct?",options:["All athletes are singers","Some singers are athletes","No singer is an athlete","All singers are athletes"],correctAnswer:1,difficulty:"easy",type:"critical-reasoning",explanation:"If some athletes are singers, then some singers are athletes."},{id:6,question:"A clock shows 3 PM. Three hours later, what time will it show?",options:["5 PM","6 PM","7 PM","8 PM"],correctAnswer:1,difficulty:"easy",type:"critical-reasoning",explanation:"Adding 3 hours to 3 PM gives 6 PM."},{id:7,question:"If every doctor is educated and Ravi is a doctor, then Ravi is:",options:["Uneducated","Educated","A teacher","A lawyer"],correctAnswer:1,difficulty:"easy",type:"critical-reasoning",explanation:"Every doctor is educated. Ravi is a doctor, so Ravi is educated."},{id:8,question:"Statement: The ground is wet because it rained. What type of relationship is this?",options:["Cause and effect","Comparison","Contrast","Opinion"],correctAnswer:0,difficulty:"easy",type:"critical-reasoning",explanation:"Rain is the cause and the wet ground is the effect."},{id:9,question:"If all cats are animals and Tommy is a cat, what can we conclude?",options:["Tommy is an animal","Tommy is a tiger","Tommy is not an animal","Tommy can bark"],correctAnswer:0,difficulty:"easy",type:"critical-reasoning",explanation:"All cats are animals. Since Tommy is a cat, Tommy is an animal."},{id:10,question:"Statement: Some books are interesting. Which statement is valid?",options:["All books are interesting","Some interesting things are books","No books are interesting","Interesting books do not exist"],correctAnswer:1,difficulty:"easy",type:"critical-reasoning",explanation:"If some books are interesting, then some interesting things are books."},{id:11,question:"If all apples are fruits and some fruits are yellow, then:",options:["All apples are yellow","Some apples may be yellow","No apples are fruits","Fruits are vegetables"],correctAnswer:1,difficulty:"easy",type:"critical-reasoning",explanation:"Some fruits are yellow, so it is possible that some apples may also be yellow."},{id:12,question:"A train travels 60 km in one hour. How far will it travel in 2 hours?",options:["100 km","110 km","120 km","130 km"],correctAnswer:2,difficulty:"easy",type:"critical-reasoning",explanation:"60 km in 1 hour means 120 km in 2 hours."},{id:13,question:"If all teachers work in schools and Anita is a teacher, Anita works in:",options:["A hospital","A school","A bank","A mall"],correctAnswer:1,difficulty:"easy",type:"critical-reasoning",explanation:"All teachers work in schools. Anita is a teacher, so she works in a school."},{id:14,question:"Statement: The power went out because of the storm. Which is the cause?",options:["Power cut","Storm","Electricity","Darkness"],correctAnswer:1,difficulty:"easy",type:"critical-reasoning",explanation:"The storm caused the power outage."},{id:15,question:"If some cars are electric and all electric vehicles save fuel, what can be concluded?",options:["Some cars save fuel","All cars save fuel","No cars save fuel","Electric cars do not exist"],correctAnswer:0,difficulty:"easy",type:"critical-reasoning",explanation:"Some cars are electric, and electric vehicles save fuel. Therefore, some cars save fuel."},{id:16,question:"Statement: All mangoes are fruits. All fruits contain vitamins. Therefore:",options:["All mangoes contain vitamins","No mangoes contain vitamins","Only fruits contain vitamins","Mangoes are vegetables"],correctAnswer:0,difficulty:"easy",type:"critical-reasoning",explanation:"Mangoes are fruits and fruits contain vitamins, so mangoes contain vitamins."},{id:17,question:"If all laptops are electronic devices and some electronic devices are expensive, then:",options:["All laptops are expensive","Some laptops may be expensive","No laptops are expensive","Laptops are not electronic"],correctAnswer:1,difficulty:"easy",type:"critical-reasoning",explanation:"Some electronic devices are expensive, so some laptops may also be expensive."},{id:18,question:"A shopkeeper sold 5 pens for ₹50. What is the price of one pen?",options:["₹5","₹8","₹10","₹15"],correctAnswer:2,difficulty:"easy",type:"critical-reasoning",explanation:"₹50 divided by 5 pens equals ₹10 per pen."},{id:19,question:"Statement: Healthy food improves fitness. Rahul eats healthy food daily. What can be inferred?",options:["Rahul may improve his fitness","Rahul dislikes fitness","Rahul never exercises","Healthy food is harmful"],correctAnswer:0,difficulty:"easy",type:"critical-reasoning",explanation:"Healthy food improves fitness, so Rahul may improve his fitness by eating healthy food daily."},{id:20,question:"If all planets revolve around the Sun and Earth is a planet, then:",options:["Earth revolves around the Sun","Earth is the Sun","Earth does not move","Planets are stars"],correctAnswer:0,difficulty:"easy",type:"critical-reasoning",explanation:"All planets revolve around the Sun. Earth is a planet, so Earth revolves around the Sun."}],UQ=[...wQ,...yQ,...CQ,...QQ,...vQ];let bQ=1e3;const L=()=>bQ++,xQ=[{id:L(),type:"rc",difficulty:"medium",passage:"Artificial intelligence has made remarkable strides in natural language processing and computer vision. However, AI systems still struggle with tasks that humans find trivially easy — understanding context, exercising common sense, and adapting to novel situations. This gap has led researchers to explore hybrid approaches combining neural networks with symbolic reasoning.",question:"The author suggests the solution to AI's limitations lies in:",options:["Building bigger neural networks","Abandoning neural networks","Combining different AI approaches","Focusing only on language processing"],correctAnswer:2,explanation:'The passage mentions "hybrid approaches combining neural networks with symbolic reasoning."'},{id:L(),type:"rc",difficulty:"medium",passage:"Democracy is not merely about elections; it is about fostering debate, dissent, and dialogue. A healthy democracy requires an informed citizenry, free press, and institutions that hold power to account. The rise of populism worldwide is a symptom of the erosion of these democratic norms.",question:"According to the passage, populism is:",options:["A cause of democratic erosion","A symptom of weakening democratic norms","The solution to democratic challenges","Unrelated to democracy"],correctAnswer:1,explanation:'The passage explicitly calls populism "a symptom of the erosion of these democratic norms."'},{id:L(),type:"rc",difficulty:"medium",passage:"The human microbiome — trillions of microorganisms living in and on our bodies — plays a crucial role in digestion, immunity, and even mental health. Recent research suggests that disruptions to the microbiome may contribute to conditions ranging from obesity to depression. This has led to growing interest in probiotics and microbiome-friendly diets.",question:"According to the passage, the microbiome may influence:",options:["Only digestion","Only immunity","Digestion, immunity, and mental health","Only mental health"],correctAnswer:2,explanation:'The passage mentions all three: "digestion, immunity, and even mental health."'},{id:L(),type:"rc",difficulty:"medium",passage:"The Silk Road was an ancient network of trade routes connecting China to the Mediterranean. It facilitated not just commerce but also the exchange of ideas, religions, and technologies between East and West. Buddhism spread from India to China along these routes, while paper-making technology traveled from China to Europe.",question:"What was a key function of the Silk Road beyond trade?",options:["Military conquest","Cultural and intellectual exchange","Only spice trading","Political governance"],correctAnswer:1,explanation:'The passage highlights "exchange of ideas, religions, and technologies."'},{id:L(),type:"rc",difficulty:"medium",passage:"Behavioral economics challenges the traditional economic assumption that humans always make rational decisions. Studies show that people are influenced by cognitive biases, emotions, and social pressures. Loss aversion — the tendency to prefer avoiding losses over acquiring gains — is one of the most powerful biases affecting decision-making.",question:"Loss aversion means people tend to:",options:["Prefer gains over avoiding losses","Prefer avoiding losses over acquiring gains","Treat gains and losses equally","Always make rational choices"],correctAnswer:1,explanation:'The passage defines it: "prefer[ring] avoiding losses over acquiring gains."'},{id:L(),type:"rc",difficulty:"medium",passage:"Renewable energy sources like solar and wind power are becoming increasingly cost-competitive with fossil fuels. In many regions, solar energy is now the cheapest source of electricity. However, the intermittent nature of renewables — the sun doesn't always shine, and the wind doesn't always blow — requires advances in energy storage technology.",question:"The main challenge for renewable energy according to the passage is:",options:["Cost","Intermittency and storage","Lack of demand","Government opposition"],correctAnswer:1,explanation:'The passage identifies the "intermittent nature" and need for "advances in energy storage."'},{id:L(),type:"vocabulary",difficulty:"medium",question:`Choose the word that best replaces the italicized word: "The politician's speech was designed to obfuscate the real issues."`,options:["Clarify","Confuse","Highlight","Resolve"],correctAnswer:1,explanation:'"Obfuscate" = to make unclear or confusing; "confuse" matches.'},{id:L(),type:"vocabulary",difficulty:"medium",question:'"RECALCITRANT" means:',options:["Eager to please","Having an obstinate refusal to comply","Quick to understand","Prone to wandering"],correctAnswer:1,explanation:'"Recalcitrant" = uncooperative, stubbornly resistant.'},{id:L(),type:"vocabulary",difficulty:"medium",question:'Choose the synonym of "PERTINACIOUS".',options:["Weak","Yielding","Persistent and determined","Flexible"],correctAnswer:2,explanation:'"Pertinacious" = holding firmly to a belief or course of action; tenacious.'},{id:L(),type:"vocabulary",difficulty:"medium",question:'The word "EQUIVOCAL" means:',options:["Clear and definite","Open to more than one interpretation","Very loud","Extremely fast"],correctAnswer:1,explanation:'"Equivocal" = ambiguous, open to multiple interpretations.'},{id:L(),type:"vocabulary",difficulty:"medium",question:'"PUSILLANIMOUS" means:',options:["Brave","Showing a lack of courage","Very strong","Intelligent"],correctAnswer:1,explanation:'"Pusillanimous" = timid, showing a lack of courage or determination.'},{id:L(),type:"vocabulary",difficulty:"medium",question:'Choose the antonym of "LOQUACIOUS".',options:["Talkative","Reticent","Verbose","Garrulous"],correctAnswer:1,explanation:'"Loquacious" = talkative. "Reticent" = reserved, not revealing much — the opposite.'},{id:L(),type:"vocabulary",difficulty:"medium",question:'"MAGNANIMOUS" is closest in meaning to:',options:["Petty","Generous and forgiving","Small-minded","Aggressive"],correctAnswer:1,explanation:'"Magnanimous" = very generous or forgiving, especially toward rivals.'},{id:L(),type:"vocabulary",difficulty:"medium",question:'Choose the synonym of "DELETERIOUS".',options:["Beneficial","Harmful","Beautiful","Delightful"],correctAnswer:1,explanation:'"Deleterious" = causing harm or damage.'},{id:L(),type:"vocabulary",difficulty:"medium",question:'"CAPRICIOUS" means:',options:["Consistent","Given to sudden changes of mood","Careful","Ancient"],correctAnswer:1,explanation:'"Capricious" = given to sudden and unaccountable changes of mood.'},{id:L(),type:"fill-in-blanks",difficulty:"medium",question:"The diplomat's ______ response helped diffuse the tension.",options:["Tactless","Tactful","Hasty","Indifferent"],correctAnswer:1,explanation:'"Tactful" = having sensitivity in dealing with others.'},{id:L(),type:"fill-in-blanks",difficulty:"medium",question:"The scientist's theory was eventually ______ by the academic community after peer review.",options:["Refuted","Vindicated","Dismissed","Questioned"],correctAnswer:1,explanation:'"Vindicated" = shown to be right or reasonable.'},{id:L(),type:"fill-in-blanks",difficulty:"medium",question:"The CEO's ______ leadership style inspired confidence in all employees.",options:["Vacillating","Resolute","Timid","Confused"],correctAnswer:1,explanation:'"Resolute" = admirably purposeful and determined.'},{id:L(),type:"fill-in-blanks",difficulty:"medium",question:"The artist was known for her ______ attention to detail in every painting.",options:["Sloppy","Meticulous","Casual","Careless"],correctAnswer:1,explanation:'"Meticulous" = showing great attention to detail; very careful.'},{id:L(),type:"fill-in-blanks",difficulty:"medium",question:"Despite being a ______ speaker, she preferred listening to others.",options:["Loquacious","Laconic","Reticent","Taciturn"],correctAnswer:0,explanation:'The contrast "despite" suggests she talks a lot (loquacious) but preferred listening.'},{id:L(),type:"sentence-correction",difficulty:"medium",question:"Identify the correct sentence:",options:["If I was rich, I would buy a yacht.","If I were rich, I would buy a yacht.","If I am rich, I would buy a yacht.","If I had been rich, I will buy a yacht."],correctAnswer:1,explanation:'Second conditional (hypothetical) uses "were" for all subjects.'},{id:L(),type:"sentence-correction",difficulty:"medium",question:"Choose the correct sentence:",options:["The number of students are increasing.","The number of students is increasing.","A number of students is increasing.","The numbers of students are increasing."],correctAnswer:1,explanation:'"The number of" is singular → "is". (Note: "a number of" would be plural.)'},{id:L(),type:"sentence-correction",difficulty:"medium",question:'Which sentence uses "affect" and "effect" correctly?',options:["The effect of the policy affected everyone.","The affect of the policy effected everyone.","The effect of the policy effected everyone.","The affect of the policy affected everyone."],correctAnswer:0,explanation:'"Effect" (noun) = result. "Affect" (verb) = to influence.'},{id:L(),type:"grammar",difficulty:"medium",question:'Which sentence correctly uses "fewer" vs "less"?',options:["There are less students today.","There are fewer students today.","There is fewer water today.","There are less water today."],correctAnswer:1,explanation:'"Fewer" for countable nouns (students). "Less" for uncountable nouns.'},{id:L(),type:"grammar",difficulty:"medium",question:"Choose the correct sentence:",options:["Between you and I, this is a secret.","Between you and me, this is a secret.","Between you and myself, this is a secret.","Between you and mine, this is a secret."],correctAnswer:1,explanation:'Preposition "between" requires object pronouns: "you and me."'},{id:L(),type:"grammar",difficulty:"medium",question:'Which is the correct indirect speech? He said, "I have been working here for two years."',options:["He said he has been working there for two years.","He said he had been working there for two years.","He said he was working here for two years.","He said he is working there for two years."],correctAnswer:1,explanation:"Present perfect continuous → past perfect continuous in reported speech."},{id:L(),type:"critical-reasoning",difficulty:"medium",question:'"All birds can fly. Penguins are birds. Therefore, penguins can fly." What is the logical flaw?',options:["The conclusion doesn't follow.","The first premise is false.","The second premise is false.","No flaw exists."],correctAnswer:1,explanation:'The first premise "All birds can fly" is factually incorrect.'},{id:L(),type:"critical-reasoning",difficulty:"medium",question:"A study found breakfast-eaters score higher on tests. A newspaper concluded breakfast causes better scores. Which assumption does this depend on?",options:["All students eat the same breakfast.","No other factor causes both breakfast-eating and higher scores.","Students who skip breakfast are lazy.","Teachers prefer breakfast-eaters."],correctAnswer:1,explanation:"The conclusion assumes no confounding variable explains both."},{id:L(),type:"critical-reasoning",difficulty:"medium",question:'"If it rains, the ground gets wet. The ground is wet. Therefore, it rained." This is an example of:',options:["Valid deduction","Affirming the consequent (fallacy)","Denying the antecedent","Modus ponens"],correctAnswer:1,explanation:"Affirming the consequent is a logical fallacy — the ground could be wet for other reasons."},{id:L(),type:"critical-reasoning",difficulty:"medium",question:"Company profits rose after hiring a new manager. The CEO credited the manager. What weakens this?",options:["The manager has an MBA.","A major competitor went bankrupt during the same period.","Employees like the manager.","The manager works long hours."],correctAnswer:1,explanation:"The competitor going bankrupt offers an alternative explanation for increased profits."},{id:L(),type:"critical-reasoning",difficulty:"medium",question:`"Either it's raining or it's sunny. It's not raining. Therefore, it's sunny." This is an example of:`,options:["False dilemma","Disjunctive syllogism (valid)","Circular reasoning","Ad hominem"],correctAnswer:1,explanation:"Disjunctive syllogism: if A or B, and not A, then B. This is valid."},{id:L(),type:"para-jumble",difficulty:"medium",question:`Arrange:
A. However, this growth has come at a cost.
B. India's GDP has been growing steadily.
C. Environmental concerns have been largely ignored.
D. Industrial expansion has accelerated significantly.`,options:["B-D-A-C","B-A-D-C","D-B-A-C","A-B-D-C"],correctAnswer:0,explanation:"GDP growth (B) → industrial expansion (D) → caveat (A) → specific concern (C)."},{id:L(),type:"para-jumble",difficulty:"medium",question:`Arrange:

C. Critics argue it has reduced face-to-face interaction.

A. The match went into overtime.
B. Both teams played exceptionally well.
C. The scores were tied at the end of regulation time.
D. Finally, the home team scored the winning goal.`,options:["B-C-A-D","A-B-C-D","C-B-A-D","B-A-C-D"],correctAnswer:0,explanation:"Both played well (B) → scores tied (C) → overtime (A) → winning goal (D)."},{id:L(),type:"rc",difficulty:"medium",passage:"Urban farming is gaining popularity in cities worldwide. From rooftop gardens to vertical farms, urban agriculture provides fresh produce to city dwellers while reducing the carbon footprint of food transportation. Critics point out that urban farms cannot produce enough to feed entire cities, but proponents argue that even small contributions to local food security are valuable.",question:"Proponents of urban farming argue that:",options:["It can feed entire cities","Even small contributions to food security are valuable","It should replace rural farming","It is cheaper than traditional farming"],correctAnswer:1,explanation:'Proponents argue "even small contributions to local food security are valuable."'},{id:L(),type:"rc",difficulty:"medium",passage:"The placebo effect — where patients improve after receiving a fake treatment — demonstrates the powerful connection between mind and body. Studies show that placebos can reduce pain, lower blood pressure, and even ease symptoms of depression. The effect is stronger when patients believe they are receiving real treatment and when the placebo ritual is more elaborate.",question:"What strengthens the placebo effect according to the passage?",options:["Using expensive drugs","Patient belief and elaborate treatment rituals","Having more doctors present","Longer hospital stays"],correctAnswer:1,explanation:'The effect is "stronger when patients believe" and "when the placebo ritual is more elaborate."'},{id:L(),type:"vocabulary",difficulty:"medium",question:'"SANGUINE" means:',options:["Pessimistic","Optimistic in a difficult situation","Blood-red","Angry"],correctAnswer:1,explanation:'"Sanguine" = optimistic, especially in a difficult situation.'},{id:L(),type:"vocabulary",difficulty:"medium",question:'Choose the antonym of "MUNDANE".',options:["Ordinary","Extraordinary","Boring","Routine"],correctAnswer:1,explanation:'"Mundane" = ordinary, dull. "Extraordinary" is the opposite.'},{id:L(),type:"vocabulary",difficulty:"medium",question:'"PROFLIGATE" means:',options:["Frugal","Recklessly extravagant","Careful with money","Generous"],correctAnswer:1,explanation:'"Profligate" = recklessly extravagant or wasteful.'},{id:L(),type:"fill-in-blanks",difficulty:"medium",question:"The new evidence ______ the defendant's claim of innocence.",options:["Contradicted","Supported","Ignored","Questioned"],correctAnswer:0,explanation:'"Contradicted" = went against. In legal context, evidence contradicts claims.'},{id:L(),type:"fill-in-blanks",difficulty:"medium",question:"The professor's explanation was so ______ that even beginners could grasp the concept.",options:["Obscure","Lucid","Confusing","Vague"],correctAnswer:1,explanation:'"Lucid" = expressed clearly; easy to understand.'},{id:L(),type:"fill-in-blanks",difficulty:"medium",question:"The CEO ______ between two strategies before finally choosing one.",options:["Decided","Vacillated","Committed","Abandoned"],correctAnswer:1,explanation:'"Vacillated" = wavered between different opinions; hesitated.'},{id:L(),type:"grammar",difficulty:"medium",question:"Which sentence correctly uses a relative pronoun?",options:["The man which called you left a message.","The man who called you left a message.","The man whom called you left a message.","The man whose called you left a message."],correctAnswer:1,explanation:'"Who" is the subject relative pronoun for people.'},{id:L(),type:"grammar",difficulty:"medium",question:"Choose the correct sentence:",options:["He insisted on to go home early.","He insisted on going home early.","He insisted to going home early.","He insisted on go home early."],correctAnswer:1,explanation:'"Insist on" is followed by a gerund (-ing form).'},{id:L(),type:"critical-reasoning",difficulty:"medium",question:`A politician says: "My opponent's tax plan will destroy the economy." This is an example of:`,options:["Logical reasoning","Loaded language / appeal to fear","Statistical evidence","Modus ponens"],correctAnswer:1,explanation:'"Destroy" is loaded language designed to provoke fear rather than provide evidence.'},{id:L(),type:"para-jumble",difficulty:"medium",question:`Arrange:
A. The discovery of penicillin changed medicine forever.
B. Alexander Fleming noticed mold killing bacteria in his lab.
C. This accidental discovery in 1928 led to modern antibiotics.
D. Before this, even minor infections could be fatal.`,options:["B-A-C-D","D-B-A-C","B-C-A-D","D-A-B-C"],correctAnswer:1,explanation:"Context (D: infections were fatal) → discovery (B) → impact (A) → consequence (C)."},{id:L(),type:"rc",difficulty:"medium",passage:"Sleep is essential for cognitive function. During sleep, the brain consolidates memories, clears waste products, and repairs neural connections. Chronic sleep deprivation has been linked to impaired judgment, weakened immunity, and increased risk of heart disease. Despite this, many adults consistently get less than the recommended 7-9 hours.",question:"According to the passage, during sleep the brain:",options:["Shuts down completely","Consolidates memories and repairs neural connections","Only rests","Stops all activity"],correctAnswer:1,explanation:'The passage lists: "consolidates memories, clears waste products, and repairs neural connections."'},{id:L(),type:"rc",difficulty:"medium",passage:"Minimalism as a lifestyle movement advocates owning fewer possessions and focusing on what truly adds value to life. Proponents argue that reducing clutter — both physical and mental — leads to greater happiness and clarity. Critics contend that minimalism is a privilege that only the affluent can afford, as it often involves discarding items that others might need.",question:"Critics of minimalism argue that it is:",options:["Environmentally harmful","A privilege of the affluent","Too difficult to practice","Mentally unhealthy"],correctAnswer:1,explanation:'Critics say "minimalism is a privilege that only the affluent can afford."'},{id:L(),type:"vocabulary",difficulty:"medium",question:'"PERFUNCTORY" means:',options:["Thorough and careful","Carried out with minimum effort","Enthusiastic","Repeated many times"],correctAnswer:1,explanation:'"Perfunctory" = carried out with a minimum of effort or reflection.'},{id:L(),type:"fill-in-blanks",difficulty:"medium",question:"The novel's plot was so ______ that readers couldn't predict the ending.",options:["Predictable","Intricate","Simple","Transparent"],correctAnswer:1,explanation:'"Intricate" = complicated, detailed — making it hard to predict.'},{id:L(),type:"fill-in-blanks",difficulty:"medium",question:"The witness gave a ______ account of the events, leaving no room for doubt.",options:["Vague","Ambiguous","Cogent","Dubious"],correctAnswer:2,explanation:'"Cogent" = clear, logical, and convincing.'},{id:L(),type:"sentence-correction",difficulty:"medium",question:"Which sentence is correct?",options:["Not only she is talented, but also hardworking.","She is not only talented but also hardworking.","She is not only talented, but also she is hardworking.","Not only talented she is, but hardworking also."],correctAnswer:1,explanation:'"Not only...but also" should balance parallel elements: "talented" and "hardworking."'},{id:L(),type:"critical-reasoning",difficulty:"medium",question:'"80% of dentists recommend this toothpaste." This statistic may be misleading because:',options:["Dentists are always right.","The question asked to dentists may have been leading.","Toothpaste is always good.","80% is a high number."],correctAnswer:1,explanation:'Without knowing the exact question asked, "80% recommend" could be from a leading question like "Would you recommend this or nothing?"'},{id:L(),type:"grammar",difficulty:"medium",question:"Choose the correct sentence:",options:["I look forward to meet you.","I look forward to meeting you.","I look forward meeting you.","I look forward to met you."],correctAnswer:1,explanation:'"Look forward to" + gerund (-ing form). The "to" is a preposition here, not an infinitive marker.'}];let FQ=2e3;const _=()=>FQ++,EQ=[{id:_(),type:"rc",difficulty:"hard",passage:'The concept of "cultural capital," introduced by Pierre Bourdieu, refers to non-financial social assets that promote social mobility. These include education, intellect, style of speech, and dress. Bourdieu argued that cultural capital reproduces social inequality across generations. Children from privileged backgrounds inherit cultural competencies that the education system rewards, perpetuating their advantage. This challenges the meritocratic notion that success is solely the result of individual talent.',question:"Bourdieu's theory primarily challenges which assumption?",options:["That wealth determines social status.","That education can reduce inequality.","That success is purely based on individual merit.","That cultural knowledge is inherited genetically."],correctAnswer:2,explanation:'The passage explicitly challenges "the meritocratic notion that success is solely the result of individual talent."'},{id:_(),type:"rc",difficulty:"hard",passage:"Neuroplasticity — the brain's ability to reorganize itself by forming new neural connections — has overturned the belief that the adult brain is fixed. Research shows that learning, recovery from injury, and meditation can alter brain structure. However, neuroplasticity is a double-edged sword: just as the brain can be shaped by positive experiences, it can equally be molded by negative ones. Chronic stress reinforces neural pathways that perpetuate anxiety.",question:'The "double-edged sword" metaphor emphasizes that neuroplasticity:',options:["Is both helpful and harmful depending on context.","Can only be studied with advanced technology.","Is not fully understood.","Is more beneficial than harmful."],correctAnswer:0,explanation:"The metaphor shows neuroplasticity works both ways — positive changes but also negative reinforcement."},{id:_(),type:"rc",difficulty:"hard",passage:`The "tragedy of the commons" describes individuals acting rationally in their own self-interest while depleting a shared resource. Garrett Hardin's example was herders sharing a common pasture: each benefits from adding cattle, but overgrazing costs are shared by all. Hardin argued for privatization or government regulation. Elinor Ostrom challenged this by showing communities can self-organize to manage shared resources when certain design principles are in place.`,question:"Ostrom's contribution was showing:",options:["Hardin's tragedy never occurs.","Government regulation is always best.","A third alternative between privatization and regulation.","Privatization is superior."],correctAnswer:2,explanation:"Ostrom showed communities can self-organize — a third way beyond privatization vs regulation."},{id:_(),type:"rc",difficulty:"hard",passage:"The Dunning-Kruger effect is a cognitive bias where people with limited competence in a domain overestimate their abilities. Conversely, highly skilled individuals tend to underestimate their relative competence, assuming others share their knowledge. This effect has profound implications for education, management, and democratic decision-making, as it suggests that the least knowledgeable are often the most confident in their opinions.",question:"According to the passage, a key implication of the Dunning-Kruger effect is:",options:["Everyone accurately knows their skill level.","The least knowledgeable are often the most confident.","Highly skilled people are always overconfident.","Education has no effect on self-awareness."],correctAnswer:1,explanation:'The passage states: "the least knowledgeable are often the most confident in their opinions."'},{id:_(),type:"rc",difficulty:"hard",passage:"The Anthropocene is a proposed geological epoch defined by significant human impact on Earth's geology and ecosystems. Scientists debate its starting point — some argue it began with the Industrial Revolution, others with the first nuclear tests in the 1940s. Regardless of the date, the concept highlights that humanity has become a geological force, altering climate, biodiversity, and even the composition of rocks that will form in the future.",question:"The key debate about the Anthropocene is:",options:["Whether humans affect the Earth.","When it began.","Whether it is real.","Who named it."],correctAnswer:1,explanation:'The passage says "Scientists debate its starting point" — the key debate is when it began.'},{id:_(),type:"para-jumble",difficulty:"hard",question:`Arrange:
A. This phenomenon, known as confirmation bias, affects even rigorous thinkers.
B. People tend to seek information that confirms their existing beliefs.
C. The scientific method was designed in part to counteract this tendency.
D. They simultaneously avoid evidence that contradicts those beliefs.`,options:["A-B-D-C","B-D-A-C","B-A-D-C","A-D-B-C"],correctAnswer:1,explanation:"Seek confirming info (B) → avoid contradicting info (D) → name it (A) → solution (C)."},{id:_(),type:"para-jumble",difficulty:"hard",question:`Arrange:

D. Governments and corporations are racing to develop quantum-resistant algorithms.
E. The foundations of digital privacy hang in the balance.`,options:["B-A-C-E-D","B-C-A-E-D","A-B-C-D-E","B-C-D-A-E"],correctAnswer:0,explanation:"Threat (B) → broader significance (A) → cybersecurity (C) → privacy stakes (E) → response (D)."},{id:_(),type:"para-jumble",difficulty:"hard",question:`Arrange:
A. The result is a growing wealth gap between generations.

C. Housing costs have skyrocketed while wages have stagnated.
D. Student debt burdens have reached record levels.
E. Meanwhile, older generations have accumulated significant assets.`,options:["B-C-D-E-A","C-D-B-E-A","B-E-C-D-A","E-B-C-D-A"],correctAnswer:0,explanation:"Context (B) → housing (C) → debt (D) → older generation (E) → wealth gap result (A)."},{id:_(),type:"critical-reasoning",difficulty:"hard",question:"Company X's profits rose 30% after hiring a new CEO. The board credited the CEO. Which most weakens this?",options:["The CEO has an MBA from a top school.","A major competitor went bankrupt during the same period.","Employees are generally satisfied.","The previous CEO was also effective."],correctAnswer:1,explanation:"The competitor's bankruptcy provides an alternative explanation for profit increase."},{id:_(),type:"critical-reasoning",difficulty:"hard",question:'"All roses in my garden are red. All red flowers in my garden are roses." If both are true, which must be true?',options:["All flowers in my garden are red.","Red flowers and roses are the same set in my garden.","Some flowers are not red.","There are only roses in my garden."],correctAnswer:1,explanation:"Both premises establish a bidirectional relationship: roses ↔ red flowers in the garden."},{id:_(),type:"critical-reasoning",difficulty:"hard",question:"A drug trial shows patients on Drug A lost more weight than those on a placebo. But patients who knew they were on Drug A lost even more. Which conclusion is best supported?",options:["Drug A is entirely ineffective.","Drug A has value, but expectations enhance its effect.","Drug A should only be given to those who know.","The placebo group didn't lose weight."],correctAnswer:1,explanation:"The drug shows real effect, but knowing enhances it — both pharmacological and psychological factors."},{id:_(),type:"critical-reasoning",difficulty:"hard",question:"Cities with more parks have lower crime. A researcher concludes parks reduce crime. What should be investigated before accepting this?",options:["Total population.","Whether cities with more parks also have other crime-reducing characteristics.","Whether parks are well-maintained.","Types of crimes."],correctAnswer:1,explanation:"Confounding variables — wealthier cities may have both more parks AND lower crime."},{id:_(),type:"critical-reasoning",difficulty:"hard",question:'"No scientists are politicians. Some politicians are honest. Therefore, some honest people are not scientists." Is this conclusion:',options:["Valid","Invalid","Unsound but valid","True but irrelevant"],correctAnswer:0,explanation:"This is a valid syllogism. If some politicians are honest, and no politicians are scientists, then those honest politicians are not scientists."},{id:_(),type:"vocabulary",difficulty:"hard",question:'Choose the word most opposite to "PROPITIATORY".',options:["Conciliatory","Mollifying","Provocative","Pacifying"],correctAnswer:2,explanation:'"Propitiatory" = intended to appease. "Provocative" = tending to provoke — the opposite.'},{id:_(),type:"vocabulary",difficulty:"hard",question:'"SANGFROID" means:',options:["Hot-blooded passion","Coolness of mind under stress","A type of French soup","Deep melancholy"],correctAnswer:1,explanation:'"Sangfroid" (French "cold blood") = composure, especially in difficult circumstances.'},{id:_(),type:"vocabulary",difficulty:"hard",question:'"PERSPICACIOUS" means:',options:["Confused","Having keen mental perception","Stubborn","Physically strong"],correctAnswer:1,explanation:'"Perspicacious" = having a ready insight into and understanding of things.'},{id:_(),type:"vocabulary",difficulty:"hard",question:'Choose the antonym of "PROLIX".',options:["Wordy","Concise","Lengthy","Verbose"],correctAnswer:1,explanation:'"Prolix" = using too many words; tediously long. "Concise" is the opposite.'},{id:_(),type:"vocabulary",difficulty:"hard",question:'"SUPERCILIOUS" means:',options:["Humble","Behaving as though one is superior","Very fast","Extremely kind"],correctAnswer:1,explanation:'"Supercilious" = having an arrogantly superior disposition.'},{id:_(),type:"vocabulary",difficulty:"hard",question:'Choose the synonym of "SALUBRIOUS".',options:["Unhealthy","Health-promoting","Delicious","Dangerous"],correctAnswer:1,explanation:'"Salubrious" = health-giving; healthy.'},{id:_(),type:"vocabulary",difficulty:"hard",question:'"DIFFIDENT" means:',options:["Confident","Modest or shy because of lack of self-confidence","Different","Difficult"],correctAnswer:1,explanation:'"Diffident" = modest or shy because of a lack of self-confidence.'},{id:_(),type:"fill-in-blanks",difficulty:"hard",question:"The philosopher's arguments, though seemingly erudite, were ultimately ______ — impressive jargon but no substance.",options:["Profound","Specious","Cogent","Perspicacious"],correctAnswer:1,explanation:'"Specious" = superficially plausible but actually wrong — fits "impressive jargon but no substance."'},{id:_(),type:"fill-in-blanks",difficulty:"hard",question:"The minister's attempts to ______ the corruption scandal only amplified public outrage.",options:["Exacerbate","Obfuscate","Elucidate","Mitigate"],correctAnswer:1,explanation:'"Obfuscate" = to obscure. Trying to obscure the scandal backfired.'},{id:_(),type:"fill-in-blanks",difficulty:"hard",question:"The general's ______ strategy surprised even his own advisors.",options:["Pedestrian","Audacious","Cautious","Conventional"],correctAnswer:1,explanation:'"Audacious" = showing a willingness to take bold risks — fits "surprised even his own advisors."'},{id:_(),type:"fill-in-blanks",difficulty:"hard",question:"The two theories, though seemingly contradictory, are actually ______ — both can coexist.",options:["Irreconcilable","Mutually exclusive","Compatible","Identical"],correctAnswer:2,explanation:'"Compatible" = able to exist together — fits "both can coexist."'},{id:_(),type:"fill-in-blanks",difficulty:"hard",question:"The critic described the film as ______ — a confusing mess of plot holes and wooden acting.",options:["A masterpiece","An incoherent disaster","A triumph","A revelation"],correctAnswer:1,explanation:'"Incoherent disaster" matches the negative description of plot holes and bad acting.'},{id:_(),type:"sentence-correction",difficulty:"hard",question:"Which uses the subjunctive mood correctly?",options:["It is essential that he submits the report.","It is essential that he submit the report.","It is essential that he will submit the report.","It is essential that he submitted the report."],correctAnswer:1,explanation:'Subjunctive uses the base form: "submit" (not "submits") after "essential that."'},{id:_(),type:"sentence-correction",difficulty:"hard",question:"Which sentence is correct?",options:["Not only did she complete the project, but she also reduced costs.","She not only completed the project, but also she reduced costs.","Not only she completed the project, but she also reduced costs.","She completed not only the project, but also reduced costs."],correctAnswer:0,explanation:'When "not only" starts a clause, subject-auxiliary inversion is required: "did she complete."'},{id:_(),type:"grammar",difficulty:"hard",question:"Which correctly uses a split infinitive for stylistic effect?",options:["To boldly go where no one has gone before.","To go boldly where no one has gone before.","To go where no one has gone before boldly.","Boldly to go where no one has gone before."],correctAnswer:0,explanation:'Modern linguistics accepts split infinitives. "To boldly go" is the most impactful placement.'},{id:_(),type:"grammar",difficulty:"hard",question:"Which sentence demonstrates correct dangling modifier usage?",options:["Walking down the street, the trees looked beautiful.","Walking down the street, I saw the beautiful trees.","Walking down the street, the beautiful trees were seen.","Having walked down the street, the trees appeared beautiful."],correctAnswer:1,explanation:'The modifier "walking" must modify the subject "I" — only B correctly matches the doer.'},{id:_(),type:"grammar",difficulty:"hard",question:"Choose the correct conditional:",options:["Had I known, I would have helped.","If I would have known, I had helped.","If I had knew, I would help.","Had I knew, I would have helped."],correctAnswer:0,explanation:'Third conditional: "Had I known" (past perfect inversion) + "would have helped."'},{id:_(),type:"grammar",difficulty:"hard",question:"Which sentence correctly uses an appositive?",options:["My friend, a doctor, is coming to dinner.","My friend a doctor, is coming to dinner.","My friend, a doctor is coming to dinner.","My friend a doctor is coming, to dinner."],correctAnswer:0,explanation:'Appositives need commas on both sides when non-restrictive: "friend, a doctor, is."'},{id:_(),type:"rc",difficulty:"hard",passage:"Algorithmic bias occurs when AI systems produce systematically unfair outcomes due to prejudiced assumptions in their training data. For example, hiring algorithms trained on historical hiring data may perpetuate past discrimination against women or minorities. Addressing this requires not just better data but also diverse teams developing these systems and ongoing auditing of their outputs.",question:"The passage suggests that addressing algorithmic bias requires:",options:["Only better data","Only diverse teams","Multiple approaches including better data, diverse teams, and auditing","Abandoning AI entirely"],correctAnswer:2,explanation:'The passage calls for "better data," "diverse teams," and "ongoing auditing" — a multi-pronged approach.'},{id:_(),type:"rc",difficulty:"hard",passage:"Epigenetics studies how behaviors and environment can cause changes that affect gene expression without altering the DNA sequence itself. These changes can sometimes be passed from parents to children. This challenges the traditional view of genetics as a fixed blueprint, suggesting instead that our experiences can influence which genes are activated in future generations.",question:"Epigenetics challenges the traditional view by showing:",options:["DNA is irrelevant.","Gene expression can be influenced by experience without changing DNA.","Genetics is completely random.","Parents and children share no genetic material."],correctAnswer:1,explanation:'The passage says experiences influence "which genes are activated" without altering the DNA sequence.'},{id:_(),type:"rc",difficulty:"hard",passage:"The prisoner's dilemma is a game theory scenario where two rational individuals might not cooperate, even when cooperation would benefit both. Each person has an incentive to betray the other, but mutual betrayal leads to a worse outcome than mutual cooperation. This dilemma has been used to model arms races, price wars, and environmental negotiations.",question:"In the prisoner's dilemma, the best collective outcome requires:",options:["Both parties betraying each other","Both parties cooperating","One party betraying while the other cooperates","Eliminating one party"],correctAnswer:1,explanation:"Mutual cooperation yields the best collective outcome, though individual incentives push toward betrayal."},{id:_(),type:"vocabulary",difficulty:"hard",question:'"PUSILLANIMITY" refers to:',options:["Courage","Cowardice, lack of determination","Great wealth","Physical strength"],correctAnswer:1,explanation:'"Pusillanimity" = cowardice, timidity.'},{id:_(),type:"vocabulary",difficulty:"hard",question:'Choose the antonym of "ENCOMIUM".',options:["Praise","Strong criticism","A type of poem","A musical composition"],correctAnswer:1,explanation:'"Encomium" = a speech or piece of writing that praises. Its opposite would be strong criticism.'},{id:_(),type:"vocabulary",difficulty:"hard",question:'"DISCURSIVE" means:',options:["Brief and to the point","Digressing from subject to subject","Aggressive","Silent"],correctAnswer:1,explanation:'"Discursive" = tending to digress from the main point; covering many topics.'},{id:_(),type:"critical-reasoning",difficulty:"hard",question:'"Either God can prevent evil and chooses not to, or God cannot prevent evil." This is an example of:',options:["Modus ponens","A false dichotomy","Inductive reasoning","Analogical reasoning"],correctAnswer:1,explanation:"This presents only two options when there may be others (e.g., God has reasons beyond human understanding), making it a false dichotomy."},{id:_(),type:"critical-reasoning",difficulty:"hard",question:"A study shows hospital patients who pray recover faster. A church group claims prayer causes healing. Which is the most important confounding variable?",options:["The type of prayer used.","Patients who pray may also have stronger social support and positive attitudes.","Hospitals are stressful.","Doctors prefer religious patients."],correctAnswer:1,explanation:"Social support and positive attitude are confounding variables that could explain both the praying behavior and faster recovery."},{id:_(),type:"critical-reasoning",difficulty:"hard",question:"If all A are B, and some B are C, which conclusion is valid?",options:["All A are C.","Some A are C.","Some B are A.","All C are A."],correctAnswer:2,explanation:"If all A are B, then some B are A (the A subset). We cannot conclude anything about A and C's relationship."},{id:_(),type:"fill-in-blanks",difficulty:"hard",question:"The author's prose was praised for its ______ quality — every word seemed carefully chosen.",options:["Prosaic","Meticulous","Careless","Verbose"],correctAnswer:1,explanation:'"Meticulous" = showing great attention to detail — fits "every word carefully chosen."'},{id:_(),type:"para-jumble",difficulty:"hard",question:`Arrange:
A. This has led to an epidemic of loneliness.
B. Social media promises connection but often delivers isolation.
C. People curate perfect online personas while feeling empty inside.
D. The paradox of our hyper-connected age is profound.`,options:["D-B-C-A","B-C-D-A","D-C-B-A","B-D-C-A"],correctAnswer:0,explanation:"Paradox stated (D) → promise vs reality (B) → specific behavior (C) → consequence (A)."},{id:_(),type:"grammar",difficulty:"hard",question:'Which correctly uses "whom"?',options:["Whom did you say was calling?","Who did you say was calling?","Whom did you say you saw?","Who did you say you saw?"],correctAnswer:2,explanation:'"Whom" is the object of "saw" — "you saw whom" → "whom did you say you saw."'},{id:_(),type:"fill-in-blanks",difficulty:"hard",question:"The diplomat handled the crisis with remarkable ______, calming both sides without offending either.",options:["Clumsiness","Tact","Aggression","Indifference"],correctAnswer:1,explanation:'"Tact" = skill in dealing with difficult situations without giving offense.'},{id:_(),type:"vocabulary",difficulty:"hard",question:'"INEFFABLE" means:',options:["Easy to describe","Too great or extreme to be expressed in words","Not efficient","Very common"],correctAnswer:1,explanation:'"Ineffable" = too great or extreme to be expressed or described in words.'},{id:_(),type:"vocabulary",difficulty:"hard",question:'Choose the synonym of "VENAL".',options:["Honest","Corrupt, willing to be bribed","Healthy","Quick"],correctAnswer:1,explanation:'"Venal" = showing susceptibility to bribery; corrupt.'}];let HQ=3e3;const K=()=>HQ++,SQ=[{id:K(),type:"rc",difficulty:"cat",source:'Modeled on CAT 2022 RC passage pattern — "Language & Cognition"',passage:"The Sapir-Whorf hypothesis, in its strong form (linguistic determinism), posits that language determines thought — speakers of different languages perceive the world fundamentally differently. The weak form (linguistic relativity) suggests language influences thought without strictly determining it. Experimental evidence is mixed: studies on color perception show language affects categorization, while spatial reasoning research shows speakers of absolute-direction languages (using north/south instead of left/right) have superior spatial orientation. Critics argue these effects are modest and core cognitive processes remain universal.",question:"Which inference is best supported?",options:["The strong form has been conclusively proven.","Language has no effect on cognition.","Language can influence certain cognitive processes, but the extent is debated.","All cognitive processes are identical across languages."],correctAnswer:2,explanation:'The passage presents evidence for influence but notes critics call effects "modest" and processes "largely universal."'},{id:K(),type:"rc",difficulty:"cat",source:'Modeled on CAT 2021 RC passage pattern — "Postcolonial Theory"',passage:"Colonialism's intellectual legacy persists invisibly within formerly colonial powers. The Eurocentric framework positions Europe as civilization's active agent while relegating colonized peoples to passive recipients. This narrative persists not through conspiracy but because it's embedded in knowledge production structures — university curricula, social science categories, the language of development. Postcolonial scholars like Said and Spivak demonstrated how knowledge and power intertwine: the colonizer's epistemology was imposed as universal. Decolonizing knowledge is not about adding diverse voices but questioning the frameworks themselves.",question:"The author argues decolonizing knowledge requires:",options:["Including more non-European authors.","Rejecting all European traditions.","Questioning the fundamental frameworks of knowledge organization.","Creating separate systems for different cultures."],correctAnswer:2,explanation:'"Not merely about adding diverse voices... but about questioning the frameworks themselves."'},{id:K(),type:"rc",difficulty:"cat",source:`Inspired by passage style from Arun Sharma's "How to Prepare for VARC for CAT" — Pearson Education`,passage:"The paradox of tolerance, articulated by Karl Popper, states that unlimited tolerance must lead to the disappearance of tolerance. If we extend unlimited tolerance even to the intolerant, the tolerant will be destroyed. Popper did not argue we should always suppress intolerant speech, but that we should preserve the right to do so as a last resort. This creates tension: the commitment to free speech must be balanced against protecting the framework that makes free speech possible. Contemporary debates about hate speech and deplatforming are fundamentally about navigating this paradox.",question:"Popper's position on suppressing intolerant speech is best described as:",options:["Always suppress it.","Never suppress it.","Available as a last resort to protect tolerant society.","The primary duty of every government."],correctAnswer:2,explanation:'"Preserve the right to do so in principle — as a last resort."'},{id:K(),type:"rc",difficulty:"cat",source:'Modeled on XAT 2023 RC passage — "Ethics of AI & Automation"',passage:"The automation of cognitive tasks through artificial intelligence raises fundamental questions about the nature of work and human purpose. If machines can write poetry, compose music, and diagnose diseases better than humans, what remains uniquely human? Some philosophers argue that the value of these activities lies not in their output but in the process — the struggle, creativity, and growth they entail. From this perspective, even if AI produces superior art, the act of human creation retains its intrinsic worth. Others counter that this romantic view ignores the economic devastation that automation may cause.",question:"The passage presents two contrasting views on:",options:["Whether AI is intelligent.","The value of human activity in an age of machine superiority.","Whether automation is economically beneficial.","The definition of art."],correctAnswer:1,explanation:"One view values the process of creation; the other worries about economic devastation — contrasting views on human value when machines outperform us."},{id:K(),type:"rc",difficulty:"cat",source:'Modeled on CAT 2020 RC passage — "Science & Society"',passage:'The replication crisis in science reveals that a significant proportion of published research findings cannot be reproduced when independent researchers repeat the experiments. This crisis stems partly from publication bias — journals prefer positive, novel results over null findings. Researchers, incentivized by the "publish or perish" culture, may unconsciously p-hack their data to find statistically significant results. The crisis undermines public trust in science, paradoxically, at a time when evidence-based policy is most needed.',question:"According to the passage, the replication crisis is caused by:",options:["Only fraudulent research.","Systemic incentives including publication bias and the publish-or-perish culture.","Lack of scientific talent.","Government interference in research."],correctAnswer:1,explanation:'The passage identifies "publication bias," "publish or perish culture," and "p-hacking" as systemic causes.'},{id:K(),type:"rc",difficulty:"cat",source:`Inspired by passage style from Nishit Sinha's "Verbal Ability and RC for CAT" — Pearson`,passage:"Free will has been debated for millennia. Determinists argue every event, including human decisions, results inevitably from prior causes. Libertarians (philosophically) argue humans possess genuine freedom. Compatibilists reconcile both: freedom means acting according to one's desires, even if those desires are determined. Each position faces challenges: determinism undermines moral responsibility, libertarian free will requires an uncaused cause, and compatibilism risks redefining freedom to satisfy no one.",question:"The author's primary purpose is to:",options:["Argue for compatibilism.","Present three positions and their challenges objectively.","Conclude free will doesn't exist.","Show determinism is most logical."],correctAnswer:1,explanation:"The passage objectively presents all three positions and notes challenges for each without advocating."},{id:K(),type:"rc",difficulty:"cat",source:'Modeled on GMAT Official Guide RC style — "Economics & Public Policy"',passage:"Universal Basic Income (UBI) proposes giving all citizens a regular cash payment regardless of employment status. Proponents argue it eliminates poverty, reduces bureaucracy, and provides a safety net against automation-driven job loss. Critics raise concerns about cost, inflation, and the possibility that UBI would reduce the incentive to work. Pilot programs in Finland and Kenya have shown mixed results: while recipients reported improved well-being, the long-term economic effects remain uncertain.",question:"Based on the passage, which statement is best supported?",options:["UBI has been proven to work.","UBI is too expensive to implement.","UBI shows promise but long-term effects are still uncertain.","UBI has no effect on well-being."],correctAnswer:2,explanation:'Pilot results are "mixed" and "long-term economic effects remain uncertain."'},{id:K(),type:"rc",difficulty:"cat",source:'Modeled on IIFT 2022 RC passage — "Philosophy of Science"',passage:`Thomas Kuhn's "The Structure of Scientific Revolutions" challenged the view that science progresses through steady accumulation of knowledge. Instead, Kuhn argued, science operates in "paradigms" — dominant frameworks that define what questions are worth asking and what counts as valid evidence. Normal science works within the paradigm until anomalies accumulate, triggering a "paradigm shift" — a revolutionary change in perspective. Copernicus replacing Ptolemy and Einstein replacing Newton exemplify such shifts.`,question:"According to Kuhn, a paradigm shift occurs when:",options:["A new technology is invented.","Anomalies accumulate beyond the current paradigm's capacity to explain.","A famous scientist proposes a new idea.","The government changes science policy."],correctAnswer:1,explanation:'Kuhn says anomalies accumulate "triggering a paradigm shift" — a revolutionary change.'},{id:K(),type:"rc",difficulty:"cat",source:'Modeled on CAT 2019 RC passage — "Cultural Studies"',passage:'The concept of "imagined communities," introduced by Benedict Anderson, explains nationalism as a socially constructed phenomenon. Nations are "imagined" because members will never know most of their fellow members, yet they share a sense of communion. This imagination is made possible by print capitalism — newspapers and novels created unified fields of exchange and communication below Latin and above vernaculars, allowing people to imagine themselves as part of a shared national narrative.',question:'Anderson argues that nations are "imagined" because:',options:["Nations do not really exist.","Citizens feel connected to people they will never personally know.","Nationalism is based on lies.","Borders are arbitrary."],correctAnswer:1,explanation:'"Members will never know most of their fellow members, yet they share a sense of communion."'},{id:K(),type:"critical-reasoning",difficulty:"cat",source:"Modeled on CAT 2018 Critical Reasoning pattern",question:"A study found that students who eat breakfast score higher on tests. A newspaper concluded eating breakfast causes better test scores. Which assumption does this depend on?",options:["All students eat the same breakfast.","No other factor causes both breakfast-eating and higher scores.","Students who skip breakfast are lazy.","Teachers prefer breakfast-eaters."],correctAnswer:1,explanation:"The causal claim assumes no confounding variable (e.g., discipline leading to both breakfast and studying)."},{id:K(),type:"critical-reasoning",difficulty:"cat",source:"Inspired by GMAT Official Guide Critical Reasoning style",question:"A company switched to open-plan offices. Productivity dropped 15%. Management blamed the layout change. Which most weakens this?",options:["Open-plan offices are modern.","The company simultaneously lost its three biggest clients.","Employees like open-plan offices.","The office is painted blue."],correctAnswer:1,explanation:"Losing biggest clients provides an alternative explanation for the productivity drop."},{id:K(),type:"critical-reasoning",difficulty:"cat",source:"Modeled on XAT 2021 Decision Making / Critical Reasoning",question:"Country A imposed tariffs on steel imports. Domestic steel production increased by 20%. The trade minister credited the tariffs. Which would most strengthen this conclusion?",options:["Other countries also imposed tariffs.","Domestic steel prices remained the same during the period.","Demand for steel in other industries increased.","The global steel price decreased."],correctAnswer:1,explanation:"If prices stayed the same, the production increase can't be attributed to price changes — strengthening the tariff argument."},{id:K(),type:"critical-reasoning",difficulty:"cat",source:`Based on logical reasoning patterns from R.S. Aggarwal's "A Modern Approach to Verbal & Non-Verbal Reasoning"`,question:'Statement: "No mammals lay eggs. The platypus lays eggs." What can be concluded?',options:["The platypus is a mammal.","The platypus is not a mammal, or the first statement is false.","All egg-layers are mammals.","Nothing can be concluded."],correctAnswer:1,explanation:"Since the platypus actually IS a mammal that lays eggs, the first statement must be false. The correct logical conclusion is that either the platypus is not a mammal OR the premise is false."},{id:K(),type:"critical-reasoning",difficulty:"cat",source:'Modeled on CAT 2023 Critical Reasoning — "Strengthen/Weaken" type',question:"A city banned plastic bags. Six months later, plastic waste in its rivers decreased by 40%. Environmentalists credit the ban. Opponents argue the reduction is due to a new recycling plant opened the same month. Which investigation would best resolve this dispute?",options:["Survey residents about their plastic use.","Compare river plastic levels to a similar city that banned bags but didn't open a recycling plant.","Count how many stores comply with the ban.","Measure air quality."],correctAnswer:1,explanation:"A control city with the ban but no recycling plant isolates the ban's effect — the scientific method of controlled comparison."},{id:K(),type:"vocabulary",difficulty:"cat",source:`Based on Norman Lewis's "Word Power Made Easy" — Goyal Publishers`,question:`Choose the pair completing: "The critic's review was ______ rather than analytical; it relied on ______ rather than evidence."`,options:["Subjective — facts","Diatribe — logic","Impressionistic — invective","Empirical — rhetoric"],correctAnswer:2,explanation:'"Impressionistic" = based on subjective impressions. "Invective" = abusive language. Both contrast with "analytical" and "evidence."'},{id:K(),type:"vocabulary",difficulty:"cat",source:'Based on "Word Power Made Easy" by Norman Lewis',question:`"The CEO's ______ leadership, characterized by grandiose promises and minimal follow-through, eroded investor confidence."`,options:["Mercurial","Phlegmatic","Efficacious","Pusillanimous"],correctAnswer:0,explanation:'"Mercurial" = subject to sudden unpredictable changes — fits grandiose promises with no follow-through.'},{id:K(),type:"vocabulary",difficulty:"cat",source:"Based on CAT 2017-2023 vocabulary patterns",question:`"The novel's protagonist is a study in contrasts — outwardly ______ yet inwardly tormented, publicly lionized yet privately ______."`,options:["Composed — revered","Tranquil — celebrated","Equable — anguished","Serene — extolled"],correctAnswer:2,explanation:'"Equable" (calm) contrasts "tormented," and "lionized" (praised) contrasts "anguished" (suffering).'},{id:K(),type:"vocabulary",difficulty:"cat",source:'Based on "Word Power Made Easy" by Norman Lewis',question:'Choose the word that means "the practice of deliberately causing someone to delay doing something."',options:["Facilitation","Procrastination","Obfuscation","Precipitation"],correctAnswer:1,explanation:'"Procrastination" = the act of delaying or postponing action.'},{id:K(),type:"vocabulary",difficulty:"cat",source:`Based on CAT vocabulary level from Arun Sharma's "How to Prepare for VARC for CAT"`,question:'"QUIXOTIC" means:',options:["Practical and realistic","Exceedingly idealistic and impractical","Cynical and pessimistic","Calm and composed"],correctAnswer:1,explanation:'"Quixotic" = exceedingly idealistic, unrealistic — from Don Quixote.'},{id:K(),type:"vocabulary",difficulty:"cat",source:'Based on "Word Power Made Easy" by Norman Lewis',question:'Choose the antonym of "SYCOPHANT".',options:["Flatterer","Critically independent person","Follower","Admirer"],correctAnswer:1,explanation:'"Sycophant" = a person who flatters to gain advantage. Its opposite is someone critically independent.'},{id:K(),type:"vocabulary",difficulty:"cat",source:"Based on Norman Lewis's vocabulary exercises",question:'"PROSCRIBE" means to:',options:["Prescribe medicine","Forbid, especially by law","Describe in detail","Write professionally"],correctAnswer:1,explanation:'"Proscribe" = to forbid, especially by law or authority. Not to be confused with "prescribe."'},{id:K(),type:"vocabulary",difficulty:"cat",source:"Based on CAT 2019-2023 vocabulary question patterns",question:'Which word means "the ability to understand and share the feelings of another"?',options:["Apathy","Empathy","Sympathy","Telepathy"],correctAnswer:1,explanation:'"Empathy" = the ability to understand and share feelings of another. "Sympathy" = feelings of pity.'},{id:K(),type:"vocabulary",difficulty:"cat",source:'Based on "Word Power Made Easy" by Norman Lewis',question:'Choose the synonym of "LOQUACIOUS".',options:["Reticent","Garrulous","Terse","Taciturn"],correctAnswer:1,explanation:'"Loquacious" and "garrulous" both mean very talkative.'},{id:K(),type:"para-jumble",difficulty:"cat",source:"Modeled on CAT 2022 Para Jumble pattern",question:`Arrange:

B. The Silk Road connected China to the Mediterranean.
C. Along with silk and spices, ideas and religions traveled.
D. Buddhism reached China through these very routes.
E. These connections shaped civilizations in profound ways.`,options:["A-B-C-D-E","B-A-C-D-E","A-C-B-D-E","B-C-A-D-E"],correctAnswer:0,explanation:"Theme (A) → specific route (B) → what traveled (C) → specific example (D) → conclusion (E)."},{id:K(),type:"sentence-correction",difficulty:"cat",source:`Based on grammar patterns from Wren & Martin's "High School English Grammar and Composition"`,question:"Which sentence is both grammatically and stylistically correct?",options:["Scarcely had he arrived when the meeting began.","Scarcely he had arrived when the meeting began.","Scarcely had he arrived than the meeting began.","Scarcely he arrived when the meeting began."],correctAnswer:0,explanation:'"Scarcely" triggers inversion: "Scarcely had he arrived" + "when" (not "than").'},{id:K(),type:"sentence-correction",difficulty:"cat",source:"Based on Wren & Martin's grammar exercises",question:"Choose the correct sentence:",options:["The committee were divided in their opinions.","The committee was divided in its opinion.","The committee were divided in its opinion.","The committee was divided in their opinions."],correctAnswer:1,explanation:'"Committee" as a singular collective noun takes "was" and "its" when acting as a single body.'},{id:K(),type:"sentence-correction",difficulty:"cat",source:"Based on CAT-level sentence correction patterns",question:"Which uses the conditional correctly?",options:["If she would have studied, she would have passed.","Had she studied, she would have passed.","If she had studied, she would pass.","Had she studied, she will pass."],correctAnswer:1,explanation:'Third conditional: "Had she studied" (inverted past perfect) + "would have passed."'},{id:K(),type:"sentence-correction",difficulty:"cat",source:'Based on Wren & Martin — "Conjunctions & Clauses"',question:"Which sentence is correct?",options:["The reason he was late is because his car broke down.","The reason he was late is that his car broke down.","The reason why he was late is because his car broke down.","The reason he was late is due to his car broke down."],correctAnswer:1,explanation:`"The reason is..." should be followed by "that" (not "because" — that's redundant).`},{id:K(),type:"fill-in-blanks",difficulty:"cat",source:"Modeled on CAT 2022 Fill-in-the-Blanks pattern",question:`"The politician's speech was long on rhetoric but short on ______, leaving voters unconvinced."`,options:["Substance","Oratory","Emotion","Volume"],correctAnswer:0,explanation:"The contrast is rhetoric vs. substance — speech was flashy but lacked real content."},{id:K(),type:"fill-in-blanks",difficulty:"cat",source:'Based on vocabulary level from "How to Prepare for VARC for CAT" by Arun Sharma',question:`"The scientist's ______ approach to research, checking every data point three times, earned her the respect of peers."`,options:["Cavalier","Meticulous","Haphazard","Superficial"],correctAnswer:1,explanation:'"Meticulous" = showing great attention to detail — fits checking every data point three times.'},{id:K(),type:"fill-in-blanks",difficulty:"cat",source:'Modeled on CAT 2023 Fill-in-the-Blanks — "Double Blanks"',question:`"The author's latest novel is a ______ exploration of grief — neither sentimental nor clinical, but deeply ______."`,options:["Maudlin — emotional","Nuanced — affecting","Superficial — moving","Pedantic — boring"],correctAnswer:1,explanation:'"Nuanced" = subtle, showing fine distinctions. "Affecting" = touching the emotions — fits neither sentimental nor clinical.'},{id:K(),type:"fill-in-blanks",difficulty:"cat",source:"Based on CAT-level vocabulary-in-context questions",question:`"Despite the CEO's ______ about future growth, the company's financials told a more ______ story."`,options:["Optimism — sanguine","Lament — cheerful","Exuberance — sobering","Enthusiasm — exciting"],correctAnswer:2,explanation:'"Despite" signals contrast: exuberance (excitement) vs. sobering (serious/worrying) financials.'},{id:K(),type:"fill-in-blanks",difficulty:"cat",source:`Inspired by passage style from Nishit Sinha's "VARC for CAT" — Pearson`,question:'"The philosopher argued that moral judgments are not objective truths but rather expressions of personal ______, a position known as ______."',options:["Values — relativism","Preference — emotivism","Facts — absolutism","Beliefs — realism"],correctAnswer:1,explanation:"Emotivism is the ethical theory that moral judgments express emotional attitudes (preferences), not objective facts."},{id:K(),type:"grammar",difficulty:"cat",source:"Based on advanced grammar from Wren & Martin",question:"Which sentence uses the optative subjunctive?",options:["If I were king, things would be different.","Long live the King!","He insisted that she leave immediately.","Be that as it may."],correctAnswer:1,explanation:'The optative subjunctive expresses a wish: "Long live the King!" = "May the King live long."'},{id:K(),type:"grammar",difficulty:"cat",source:"Based on CAT-level grammar patterns",question:"Identify the sentence with correct punctuation of a non-restrictive clause:",options:["My brother who lives in Mumbai is a doctor.","My brother, who lives in Mumbai, is a doctor.","My brother who lives in Mumbai, is a doctor.","My brother, who lives in Mumbai is a doctor."],correctAnswer:1,explanation:'Non-restrictive clauses need commas on both sides: ", who lives in Mumbai," — it adds info, not identifies which brother.'},{id:K(),type:"rc",difficulty:"cat",source:'Modeled on CAT 2023 RC passage — "Existentialism & Ethics"',passage:`Existentialism, associated with thinkers like Sartre and Camus, emphasizes individual freedom and responsibility. Sartre's famous dictum "existence precedes essence" means humans are not born with a predetermined purpose — we define ourselves through our choices. This philosophy places enormous weight on individual decision-making: if there is no predetermined human nature, then every choice we make contributes to defining what it means to be human, not just for ourselves but as a model for all humanity.`,question:"According to Sartre's existentialism, our choices are significant because they:",options:["Only affect ourselves.","Determine our salary.","Define what it means to be human for all people.","Are predetermined by God."],correctAnswer:2,explanation:'"Every choice we make contributes to defining what it means to be human... as a model for all humanity."'},{id:K(),type:"rc",difficulty:"cat",source:'Modeled on XAT 2022 RC passage — "Psychology & Decision Making"',passage:"Cognitive dissonance theory, developed by Leon Festinger, explains the mental discomfort experienced when holding two contradictory beliefs. To reduce this discomfort, people may change their beliefs, seek confirming information, or rationalize the contradiction. This has profound implications: smokers who know smoking causes cancer may convince themselves the evidence is flawed rather than quit. The theory suggests that humans are not rational truth-seekers but consistency-seekers, prioritizing psychological comfort over accuracy.",question:"The passage suggests that cognitive dissonance theory challenges the view that humans are:",options:["Emotional beings.","Rational truth-seekers.","Social animals.","Capable of change."],correctAnswer:1,explanation:'The passage contrasts "rational truth-seekers" with "consistency-seekers" — humans prioritize comfort over accuracy.'},{id:K(),type:"rc",difficulty:"cat",source:'Modeled on IIFT 2021 RC passage — "Education & Social Justice"',passage:` Paulo Freire's "Pedagogy of the Oppressed" critiques what he calls the "banking model" of education, where teachers deposit information into passive students. Freire argues this model mirrors and reinforces oppressive social structures by treating students as empty vessels rather than active participants. He proposes instead a "problem-posing" education where teachers and students learn together through dialogue, treating knowledge as a collaborative construction rather than a commodity to be transferred.`,question:`Freire's critique of the "banking model" is that it:`,options:["Is too difficult for students.","Reinforces oppressive social structures.","Doesn't teach enough facts.","Is too expensive."],correctAnswer:1,explanation:'"Mirrors and reinforces oppressive social structures by treating students as empty vessels."'},{id:K(),type:"critical-reasoning",difficulty:"cat",source:`Based on logical reasoning from R.S. Aggarwal's "Verbal & Non-Verbal Reasoning"`,question:`Statement: "If the battery is dead, the car won't start. The car won't start." Which conclusion is valid?`,options:["The battery is dead.","The battery might or might not be dead — other causes are possible.","The battery is not dead.","The car has no fuel."],correctAnswer:1,explanation:"Denying the consequent is a fallacy. The car might not start for reasons other than a dead battery."},{id:K(),type:"critical-reasoning",difficulty:"cat",source:'Modeled on CAT Critical Reasoning — "Flaw in Argument" type',question:`Advertisement: "9 out of 10 dentists recommend FreshTooth toothpaste." The advertisement's claim is LEAST vulnerable to which criticism?`,options:["The sample size of dentists is unknown.","The dentists surveyed may have been paid.","The question may have been leading.","FreshTooth is the most popular brand."],correctAnswer:3,explanation:"Being the most popular brand doesn't undermine the statistic itself. The other options question the validity of the survey methodology."},{id:K(),type:"critical-reasoning",difficulty:"cat",source:'Inspired by GMAT Critical Reasoning — "Evaluate Argument" type',question:"A town banned cell phone use while driving. Accidents decreased 25%. To evaluate whether the ban caused this decrease, it would be most useful to know:",options:["How many people own cell phones.","Whether accidents decreased in nearby towns without bans during the same period.","What brand of cell phones are most popular.","How many police officers patrol the roads."],correctAnswer:1,explanation:"A control group (nearby towns without bans) helps isolate the ban's effect from general trends."},{id:K(),type:"vocabulary",difficulty:"cat",source:'Based on "Word Power Made Easy" by Norman Lewis',question:'Choose the word meaning "a false name used by an author".',options:["Pseudonym","Acronym","Synonym","Antonym"],correctAnswer:0,explanation:'"Pseudonym" = a fictitious name, especially used by an author. From Greek "pseudōnymos" = falsely named.'},{id:K(),type:"vocabulary",difficulty:"cat",source:`Based on Norman Lewis's "Word Power Made Easy" — "Words for Personalities"`,question:'"A person who is habitually tardy or late" is described as:',options:["Punctual","Dilatory","Meticulous","Altruistic"],correctAnswer:1,explanation:'"Dilatory" = slow to act; intended to cause delay. A dilatory person is habitually late.'},{id:K(),type:"vocabulary",difficulty:"cat",source:"Based on CAT-level word usage questions",question:'"EGREGIOUS" means:',options:["Outstandingly bad","Outstandingly good","Average","Subtle"],correctAnswer:0,explanation:'"Egregious" = outstandingly bad; shocking. (Originally meant "outstanding" in Latin, but evolved to mean outstandingly bad.)'},{id:K(),type:"vocabulary",difficulty:"cat",source:'Based on "Word Power Made Easy" by Norman Lewis',question:'Which word means "the fear of open or public spaces"?',options:["Acrophobia","Agoraphobia","Claustrophobia","Arachnophobia"],correctAnswer:1,explanation:'"Agoraphobia" = fear of open/public spaces. From Greek "agora" = marketplace + "phobos" = fear.'},{id:K(),type:"fill-in-blanks",difficulty:"cat",source:'Modeled on CAT 2019 Fill-in-the-Blanks — "Double Blanks"',question:'"The debate between determinism and free will has ______ philosophers for centuries, with no resolution in ______."',options:["Bored — hand","Consumed — sight","Eluded — mind","Perplexed — view"],correctAnswer:1,explanation:'"Consumed" = occupied obsessively. "No resolution in sight" = no prospect of resolution.'},{id:K(),type:"fill-in-blanks",difficulty:"cat",source:"Based on vocabulary-in-context from Arun Sharma's VARC preparation",question:`"The architect's design was both ______ and controversial — praised for its originality but criticized for being impractical."`,options:["Pedestrian","Avant-garde","Conventional","Derivative"],correctAnswer:1,explanation:'"Avant-garde" = new and experimental. Original and controversial fits the avant-garde style.'},{id:K(),type:"fill-in-blanks",difficulty:"cat",source:"Modeled on CAT 2021 Fill-in-the-Blanks",question:'"The diplomat managed to ______ the two warring factions into a temporary ceasefire through sheer ______."',options:["Provoke — anger","Coax — persuasion","Force — weakness","Ignore — indifference"],correctAnswer:1,explanation:'"Coax" = persuade gently. "Persuasion" = the act of convincing — fits diplomatic efforts for a ceasefire.'}],Ba={easy:{label:"Easy",color:"from-emerald-500 to-green-600",bg:"bg-emerald-500",timePerQuestion:45,questionsPerSession:10},medium:{label:"Medium",color:"from-amber-500 to-orange-600",bg:"bg-amber-500",timePerQuestion:45,questionsPerSession:10},hard:{label:"Hard",color:"from-red-500 to-rose-600",bg:"bg-red-500",timePerQuestion:45,questionsPerSession:10},cat:{label:"CAT Level",color:"from-violet-500 to-purple-700",bg:"bg-violet-500",timePerQuestion:45,questionsPerSession:10}},TQ=[...UQ,...xQ,...EQ,...SQ];function DQ(A){const e=A.options[A.correctAnswer],t=[0,1,2,3];for(let n=3;n>0;n--){const i=Math.floor(Math.random()*(n+1));[t[n],t[i]]=[t[i],t[n]]}const a=t.map(n=>A.options[n]);return{...A,options:a,correctAnswer:a.indexOf(e)}}function NQ(A,e){return[...TQ.filter(n=>n.difficulty===A)].sort(()=>Math.random()-.5).slice(0,e).map(DQ)}const IQ=[{key:"easy",icon:cQ,title:"Easy",sub:"Build your foundation",accent:"text-emerald-400",bg:"from-emerald-400 to-green-500",grad:"from-emerald-500/10 to-green-600/10",pillBg:"bg-emerald-500",shadow:"hover:shadow-[0_0_30px_rgba
