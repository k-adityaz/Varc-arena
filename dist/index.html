C. Housing costs have skyrocketed while wages have stagnated.
D. Student debt burdens have reached record levels.
E. Meanwhile, older generations have accumulated significant assets.`,options:["B-C-D-E-A","C-D-B-E-A","B-E-C-D-A","E-B-C-D-A"],correctAnswer:0,explanation:"Context (B) → housing (C) → debt (D) → older generation (E) → wealth gap result (A)."},{id:uA(),type:"critical-reasoning",difficulty:"hard",question:"Company X's profits rose 30% after hiring a new CEO. The board credited the CEO. Which most weakens this?",options:["The CEO has an MBA from a top school.","A major competitor went bankrupt during the same period.","Employees are generally satisfied.","The previous CEO was also effective."],correctAnswer:1,explanation:"The competitor's bankruptcy provides an alternative explanation for profit increase."},{id:uA(),type:"critical-reasoning",difficulty:"hard",question:'"All roses in my garden are red. All red flowers in my garden are roses." If both are true, which must be true?',options:["All flowers in my garden are red.","Red flowers and roses are the same set in my garden.","Some flowers are not red.","There are only roses in my garden."],correctAnswer:1,explanation:"Both premises establish a bidirectional relationship: roses ↔ red flowers in the garden."},{id:uA(),type:"critical-reasoning",difficulty:"hard",question:"A drug trial shows patients on Drug A lost more weight than those on a placebo. But patients who knew they were on Drug A lost even more. Which conclusion is best supported?",options:["Drug A is entirely ineffective.","Drug A has value, but expectations enhance its effect.","Drug A should only be given to those who know.","The placebo group didn't lose weight."],correctAnswer:1,explanation:"The drug shows real effect, but knowing enhances it — both pharmacological and psychological factors."},{id:uA(),type:"critical-reasoning",difficulty:"hard",question:"Cities with more parks have lower crime. A researcher concludes parks reduce crime. What should be investigated before accepting this?",options:["Total population.","Whether cities with more parks also have other crime-reducing characteristics.","Whether parks are well-maintained.","Types of crimes."],correctAnswer:1,explanation:"Confounding variables — wealthier cities may have both more parks AND lower crime."},{id:uA(),type:"critical-reasoning",difficulty:"hard",question:'"No scientists are politicians. Some politicians are honest. Therefore, some honest people are not scientists." Is this conclusion:',options:["Valid","Invalid","Unsound but valid","True but irrelevant"],correctAnswer:0,explanation:"This is a valid syllogism. If some politicians are honest, and no politicians are scientists, then those honest politicians are not scientists."},{id:uA(),type:"vocabulary",difficulty:"hard",question:'Choose the word most opposite to "PROPITIATORY".',options:["Conciliatory","Mollifying","Provocative","Pacifying"],correctAnswer:2,explanation:'"Propitiatory" = intended to appease. "Provocative" = tending to provoke — the opposite.'},{id:uA(),type:"vocabulary",difficulty:"hard",question:'"SANGFROID" means:',options:["Hot-blooded passion","Coolness of mind under stress","A type of French soup","Deep melancholy"],correctAnswer:1,explanation:'"Sangfroid" (French "cold blood") = composure, especially in difficult circumstances.'},{id:uA(),type:"vocabulary",difficulty:"hard",question:'"PERSPICACIOUS" means:',options:["Confused","Having keen mental perception","Stubborn","Physically strong"],correctAnswer:1,explanation:'"Perspicacious" = having a ready insight into and understanding of things.'},{id:uA(),type:"vocabulary",difficulty:"hard",question:'Choose the antonym of "PROLIX".',options:["Wordy","Concise","Lengthy","Verbose"],correctAnswer:1,explanation:'"Prolix" = using too many words; tediously long. "Concise" is the opposite.'},{id:uA(),type:"vocabulary",difficulty:"hard",question:'"SUPERCILIOUS" means:',options:["Humble","Behaving as though one is superior","Very fast","Extremely kind"],correctAnswer:1,explanation:'"Supercilious" = having an arrogantly superior disposition.'},{id:uA(),type:"vocabulary",difficulty:"hard",question:'Choose the synonym of "SALUBRIOUS".',options:["Unhealthy","Health-promoting","Delicious","Dangerous"],correctAnswer:1,explanation:'"Salubrious" = health-giving; healthy.'},{id:uA(),type:"vocabulary",difficulty:"hard",question:'"DIFFIDENT" means:',options:["Confident","Modest or shy because of lack of self-confidence","Different","Difficult"],correctAnswer:1,explanation:'"Diffident" = modest or shy because of a lack of self-confidence.'},{id:uA(),type:"fill-in-blanks",difficulty:"hard",question:"The philosopher's arguments, though seemingly erudite, were ultimately ______ — impressive jargon but no substance.",options:["Profound","Specious","Cogent","Perspicacious"],correctAnswer:1,explanation:'"Specious" = superficially plausible but actually wrong — fits "impressive jargon but no substance."'},{id:uA(),type:"fill-in-blanks",difficulty:"hard",question:"The minister's attempts to ______ the corruption scandal only amplified public outrage.",options:["Exacerbate","Obfuscate","Elucidate","Mitigate"],correctAnswer:1,explanation:'"Obfuscate" = to obscure. Trying to obscure the scandal backfired.'},{id:uA(),type:"fill-in-blanks",difficulty:"hard",question:"The general's ______ strategy surprised even his own advisors.",options:["Pedestrian","Audacious","Cautious","Conventional"],correctAnswer:1,explanation:'"Audacious" = showing a willingness to take bold risks — fits "surprised even his own advisors."'},{id:uA(),type:"fill-in-blanks",difficulty:"hard",question:"The two theories, though seemingly contradictory, are actually ______ — both can coexist.",options:["Irreconcilable","Mutually exclusive","Compatible","Identical"],correctAnswer:2,explanation:'"Compatible" = able to exist together — fits "both can coexist."'},{id:uA(),type:"fill-in-blanks",difficulty:"hard",question:"The critic described the film as ______ — a confusing mess of plot holes and wooden acting.",options:["A masterpiece","An incoherent disaster","A triumph","A revelation"],correctAnswer:1,explanation:'"Incoherent disaster" matches the negative description of plot holes and bad acting.'},{id:uA(),type:"sentence-correction",difficulty:"hard",question:"Which uses the subjunctive mood correctly?",options:["It is essential that he submits the report.","It is essential that he submit the report.","It is essential that he will submit the report.","It is essential that he submitted the report."],correctAnswer:1,explanation:'Subjunctive uses the base form: "submit" (not "submits") after "essential that."'},{id:uA(),type:"sentence-correction",difficulty:"hard",question:"Which sentence is correct?",options:["Not only did she complete the project, but she also reduced costs.","She not only completed the project, but also she reduced costs.","Not only she completed the project, but she also reduced costs.","She completed not only the project, but also reduced costs."],correctAnswer:0,explanation:'When "not only" starts a clause, subject-auxiliary inversion is required: "did she complete."'},{id:uA(),type:"grammar",difficulty:"hard",question:"Which correctly uses a split infinitive for stylistic effect?",options:["To boldly go where no one has gone before.","To go boldly where no one has gone before.","To go where no one has gone before boldly.","Boldly to go where no one has gone before."],correctAnswer:0,explanation:'Modern linguistics accepts split infinitives. "To boldly go" is the most impactful placement.'},{id:uA(),type:"grammar",difficulty:"hard",question:"Which sentence demonstrates correct dangling modifier usage?",options:["Walking down the street, the trees looked beautiful.","Walking down the street, I saw the beautiful trees.","Walking down the street, the beautiful trees were seen.","Having walked down the street, the trees appeared beautiful."],correctAnswer:1,explanation:'The modifier "walking" must modify the subject "I" — only B correctly matches the doer.'},{id:uA(),type:"grammar",difficulty:"hard",question:"Choose the correct conditional:",options:["Had I known, I would have helped.","If I would have known, I had helped.","If I had knew, I would help.","Had I knew, I would have helped."],correctAnswer:0,explanation:'Third conditional: "Had I known" (past perfect inversion) + "would have helped."'},{id:uA(),type:"grammar",difficulty:"hard",question:"Which sentence correctly uses an appositive?",options:["My friend, a doctor, is coming to dinner.","My friend a doctor, is coming to dinner.","My friend, a doctor is coming to dinner.","My friend a doctor is coming, to dinner."],correctAnswer:0,explanation:'Appositives need commas on both sides when non-restrictive: "friend, a doctor, is."'},{id:uA(),type:"rc",difficulty:"hard",passage:"Algorithmic bias occurs when AI systems produce systematically unfair outcomes due to prejudiced assumptions in their training data. For example, hiring algorithms trained on historical hiring data may perpetuate past discrimination against women or minorities. Addressing this requires not just better data but also diverse teams developing these systems and ongoing auditing of their outputs.",question:"The passage suggests that addressing algorithmic bias requires:",options:["Only better data","Only diverse teams","Multiple approaches including better data, diverse teams, and auditing","Abandoning AI entirely"],correctAnswer:2,explanation:'The passage calls for "better data," "diverse teams," and "ongoing auditing" — a multi-pronged approach.'},{id:uA(),type:"rc",difficulty:"hard",passage:"Epigenetics studies how behaviors and environment can cause changes that affect gene expression without altering the DNA sequence itself. These changes can sometimes be passed from parents to children. This challenges the traditional view of genetics as a fixed blueprint, suggesting instead that our experiences can influence which genes are activated in future generations.",question:"Epigenetics challenges the traditional view by showing:",options:["DNA is irrelevant.","Gene expression can be influenced by experience without changing DNA.","Genetics is completely random.","Parents and children share no genetic material."],correctAnswer:1,explanation:'The passage says experiences influence "which genes are activated" without altering the DNA sequence.'},{id:uA(),type:"rc",difficulty:"hard",passage:"The prisoner's dilemma is a game theory scenario where two rational individuals might not cooperate, even when cooperation would benefit both. Each person has an incentive to betray the other, but mutual betrayal leads to a worse outcome than mutual cooperation. This dilemma has been used to model arms races, price wars, and environmental negotiations.",question:"In the prisoner's dilemma, the best collective outcome requires:",options:["Both parties betraying each other","Both parties cooperating","One party betraying while the other cooperates","Eliminating one party"],correctAnswer:1,explanation:"Mutual cooperation yields the best collective outcome, though individual incentives push toward betrayal."},{id:uA(),type:"vocabulary",difficulty:"hard",question:'"PUSILLANIMITY" refers to:',options:["Courage","Cowardice, lack of determination","Great wealth","Physical strength"],correctAnswer:1,explanation:'"Pusillanimity" = cowardice, timidity.'},{id:uA(),type:"vocabulary",difficulty:"hard",question:'Choose the antonym of "ENCOMIUM".',options:["Praise","Strong criticism","A type of poem","A musical composition"],correctAnswer:1,explanation:'"Encomium" = a speech or piece of writing that praises. Its opposite would be strong criticism.'},{id:uA(),type:"vocabulary",difficulty:"hard",question:'"DISCURSIVE" means:',options:["Brief and to the point","Digressing from subject to subject","Aggressive","Silent"],correctAnswer:1,explanation:'"Discursive" = tending to digress from the main point; covering many topics.'},{id:uA(),type:"critical-reasoning",difficulty:"hard",question:'"Either God can prevent evil and chooses not to, or God cannot prevent evil." This is an example of:',options:["Modus ponens","A false dichotomy","Inductive reasoning","Analogical reasoning"],correctAnswer:1,explanation:"This presents only two options when there may be others (e.g., God has reasons beyond human understanding), making it a false dichotomy."},{id:uA(),type:"critical-reasoning",difficulty:"hard",question:"A study shows hospital patients who pray recover faster. A church group claims prayer causes healing. Which is the most important confounding variable?",options:["The type of prayer used.","Patients who pray may also have stronger social support and positive attitudes.","Hospitals are stressful.","Doctors prefer religious patients."],correctAnswer:1,explanation:"Social support and positive attitude are confounding variables that could explain both the praying behavior and faster recovery."},{id:uA(),type:"critical-reasoning",difficulty:"hard",question:"If all A are B, and some B are C, which conclusion is valid?",options:["All A are C.","Some A are C.","Some B are A.","All C are A."],correctAnswer:2,explanation:"If all A are B, then some B are A (the A subset). We cannot conclude anything about A and C's relationship."},{id:uA(),type:"fill-in-blanks",difficulty:"hard",question:"The author's prose was praised for its ______ quality — every word seemed carefully chosen.",options:["Prosaic","Meticulous","Careless","Verbose"],correctAnswer:1,explanation:'"Meticulous" = showing great attention to detail — fits "every word carefully chosen."'},{id:uA(),type:"para-jumble",difficulty:"hard",question:`Arrange:
A. This has led to an epidemic of loneliness.
B. Social media promises connection but often delivers isolation.
C. People curate perfect online personas while feeling empty inside.
D. The paradox of our hyper-connected age is profound.`,options:["D-B-C-A","B-C-D-A","D-C-B-A","B-D-C-A"],correctAnswer:0,explanation:"Paradox stated (D) → promise vs reality (B) → specific behavior (C) → consequence (A)."},{id:uA(),type:"grammar",difficulty:"hard",question:'Which correctly uses "whom"?',options:["Whom did you say was calling?","Who did you say was calling?","Whom did you say you saw?","Who did you say you saw?"],correctAnswer:2,explanation:'"Whom" is the object of "saw" — "you saw whom" → "whom did you say you saw."'},{id:uA(),type:"fill-in-blanks",difficulty:"hard",question:"The diplomat handled the crisis with remarkable ______, calming both sides without offending either.",options:["Clumsiness","Tact","Aggression","Indifference"],correctAnswer:1,explanation:'"Tact" = skill in dealing with difficult situations without giving offense.'},{id:uA(),type:"vocabulary",difficulty:"hard",question:'"INEFFABLE" means:',options:["Easy to describe","Too great or extreme to be expressed in words","Not efficient","Very common"],correctAnswer:1,explanation:'"Ineffable" = too great or extreme to be expressed or described in words.'},{id:uA(),type:"vocabulary",difficulty:"hard",question:'Choose the synonym of "VENAL".',options:["Honest","Corrupt, willing to be bribed","Healthy","Quick"],correctAnswer:1,explanation:'"Venal" = showing susceptibility to bribery; corrupt.'}];let NC=3e3;const lA=()=>NC++,IC=[{id:lA(),type:"rc",difficulty:"cat",source:'Modeled on CAT 2022 RC passage pattern — "Language & Cognition"',passage:"The Sapir-Whorf hypothesis, in its strong form (linguistic determinism), posits that language determines thought — speakers of different languages perceive the world fundamentally differently. The weak form (linguistic relativity) suggests language influences thought without strictly determining it. Experimental evidence is mixed: studies on color perception show language affects categorization, while spatial reasoning research shows speakers of absolute-direction languages (using north/south instead of left/right) have superior spatial orientation. Critics argue these effects are modest and core cognitive processes remain universal.",question:"Which inference is best supported?",options:["The strong form has been conclusively proven.","Language has no effect on cognition.","Language can influence certain cognitive processes, but the extent is debated.","All cognitive processes are identical across languages."],correctAnswer:2,explanation:'The passage presents evidence for influence but notes critics call effects "modest" and processes "largely universal."'},{id:lA(),type:"rc",difficulty:"cat",source:'Modeled on CAT 2021 RC passage pattern — "Postcolonial Theory"',passage:"Colonialism's intellectual legacy persists invisibly within formerly colonial powers. The Eurocentric framework positions Europe as civilization's active agent while relegating colonized peoples to passive recipients. This narrative persists not through conspiracy but because it's embedded in knowledge production structures — university curricula, social science categories, the language of development. Postcolonial scholars like Said and Spivak demonstrated how knowledge and power intertwine: the colonizer's epistemology was imposed as universal. Decolonizing knowledge is not about adding diverse voices but questioning the frameworks themselves.",question:"The author argues decolonizing knowledge requires:",options:["Including more non-European authors.","Rejecting all European traditions.","Questioning the fundamental frameworks of knowledge organization.","Creating separate systems for different cultures."],correctAnswer:2,explanation:'"Not merely about adding diverse voices... but about questioning the frameworks themselves."'},{id:lA(),type:"rc",difficulty:"cat",source:`Inspired by passage style from Arun Sharma's "How to Prepare for VARC for CAT" — Pearson Education`,passage:"The paradox of tolerance, articulated by Karl Popper, states that unlimited tolerance must lead to the disappearance of tolerance. If we extend unlimited tolerance even to the intolerant, the tolerant will be destroyed. Popper did not argue we should always suppress intolerant speech, but that we should preserve the right to do so as a last resort. This creates tension: the commitment to free speech must be balanced against protecting the framework that makes free speech possible. Contemporary debates about hate speech and deplatforming are fundamentally about navigating this paradox.",question:"Popper's position on suppressing intolerant speech is best described as:",options:["Always suppress it.","Never suppress it.","Available as a last resort to protect tolerant society.","The primary duty of every government."],correctAnswer:2,explanation:'"Preserve the right to do so in principle — as a last resort."'},{id:lA(),type:"rc",difficulty:"cat",source:'Modeled on XAT 2023 RC passage — "Ethics of AI & Automation"',passage:"The automation of cognitive tasks through artificial intelligence raises fundamental questions about the nature of work and human purpose. If machines can write poetry, compose music, and diagnose diseases better than humans, what remains uniquely human? Some philosophers argue that the value of these activities lies not in their output but in the process — the struggle, creativity, and growth they entail. From this perspective, even if AI produces superior art, the act of human creation retains its intrinsic worth. Others counter that this romantic view ignores the economic devastation that automation may cause.",question:"The passage presents two contrasting views on:",options:["Whether AI is intelligent.","The value of human activity in an age of machine superiority.","Whether automation is economically beneficial.","The definition of art."],correctAnswer:1,explanation:"One view values the process of creation; the other worries about economic devastation — contrasting views on human value when machines outperform us."},{id:lA(),type:"rc",difficulty:"cat",source:'Modeled on CAT 2020 RC passage — "Science & Society"',passage:'The replication crisis in science reveals that a significant proportion of published research findings cannot be reproduced when independent researchers repeat the experiments. This crisis stems partly from publication bias — journals prefer positive, novel results over null findings. Researchers, incentivized by the "publish or perish" culture, may unconsciously p-hack their data to find statistically significant results. The crisis undermines public trust in science, paradoxically, at a time when evidence-based policy is most needed.',question:"According to the passage, the replication crisis is caused by:",options:["Only fraudulent research.","Systemic incentives including publication bias and the publish-or-perish culture.","Lack of scientific talent.","Government interference in research."],correctAnswer:1,explanation:'The passage identifies "publication bias," "publish or perish culture," and "p-hacking" as systemic causes.'},{id:lA(),type:"rc",difficulty:"cat",source:`Inspired by passage style from Nishit Sinha's "Verbal Ability and RC for CAT" — Pearson`,passage:"Free will has been debated for millennia. Determinists argue every event, including human decisions, results inevitably from prior causes. Libertarians (philosophically) argue humans possess genuine freedom. Compatibilists reconcile both: freedom means acting according to one's desires, even if those desires are determined. Each position faces challenges: determinism undermines moral responsibility, libertarian free will requires an uncaused cause, and compatibilism risks redefining freedom to satisfy no one.",question:"The author's primary purpose is to:",options:["Argue for compatibilism.","Present three positions and their challenges objectively.","Conclude free will doesn't exist.","Show determinism is most logical."],correctAnswer:1,explanation:"The passage objectively presents all three positions and notes challenges for each without advocating."},{id:lA(),type:"rc",difficulty:"cat",source:'Modeled on GMAT Official Guide RC style — "Economics & Public Policy"',passage:"Universal Basic Income (UBI) proposes giving all citizens a regular cash payment regardless of employment status. Proponents argue it eliminates poverty, reduces bureaucracy, and provides a safety net against automation-driven job loss. Critics raise concerns about cost, inflation, and the possibility that UBI would reduce the incentive to work. Pilot programs in Finland and Kenya have shown mixed results: while recipients reported improved well-being, the long-term economic effects remain uncertain.",question:"Based on the passage, which statement is best supported?",options:["UBI has been proven to work.","UBI is too expensive to implement.","UBI shows promise but long-term effects are still uncertain.","UBI has no effect on well-being."],correctAnswer:2,explanation:'Pilot results are "mixed" and "long-term economic effects remain uncertain."'},{id:lA(),type:"rc",difficulty:"cat",source:'Modeled on IIFT 2022 RC passage — "Philosophy of Science"',passage:`Thomas Kuhn's "The Structure of Scientific Revolutions" challenged the view that science progresses through steady accumulation of knowledge. Instead, Kuhn argued, science operates in "paradigms" — dominant frameworks that define what questions are worth asking and what counts as valid evidence. Normal science works within the paradigm until anomalies accumulate, triggering a "paradigm shift" — a revolutionary change in perspective. Copernicus replacing Ptolemy and Einstein replacing Newton exemplify such shifts.`,question:"According to Kuhn, a paradigm shift occurs when:",options:["A new technology is invented.","Anomalies accumulate beyond the current paradigm's capacity to explain.","A famous scientist proposes a new idea.","The government changes science policy."],correctAnswer:1,explanation:'Kuhn says anomalies accumulate "triggering a paradigm shift" — a revolutionary change.'},{id:lA(),type:"rc",difficulty:"cat",source:'Modeled on CAT 2019 RC passage — "Cultural Studies"',passage:'The concept of "imagined communities," introduced by Benedict Anderson, explains nationalism as a socially constructed phenomenon. Nations are "imagined" because members will never know most of their fellow members, yet they share a sense of communion. This imagination is made possible by print capitalism — newspapers and novels created unified fields of exchange and communication below Latin and above vernaculars, allowing people to imagine themselves as part of a shared national narrative.',question:'Anderson argues that nations are "imagined" because:',options:["Nations do not really exist.","Citizens feel connected to people they will never personally know.","Nationalism is based on lies.","Borders are arbitrary."],correctAnswer:1,explanation:'"Members will never know most of their fellow members, yet they share a sense of communion."'},{id:lA(),type:"critical-reasoning",difficulty:"cat",source:"Modeled on CAT 2018 Critical Reasoning pattern",question:"A study found that students who eat breakfast score higher on tests. A newspaper concluded eating breakfast causes better test scores. Which assumption does this depend on?",options:["All students eat the same breakfast.","No other factor causes both breakfast-eating and higher scores.","Students who skip breakfast are lazy.","Teachers prefer breakfast-eaters."],correctAnswer:1,explanation:"The causal claim assumes no confounding variable (e.g., discipline leading to both breakfast and studying)."},{id:lA(),type:"critical-reasoning",difficulty:"cat",source:"Inspired by GMAT Official Guide Critical Reasoning style",question:"A company switched to open-plan offices. Productivity dropped 15%. Management blamed the layout change. Which most weakens this?",options:["Open-plan offices are modern.","The company simultaneously lost its three biggest clients.","Employees like open-plan offices.","The office is painted blue."],correctAnswer:1,explanation:"Losing biggest clients provides an alternative explanation for the productivity drop."},{id:lA(),type:"critical-reasoning",difficulty:"cat",source:"Modeled on XAT 2021 Decision Making / Critical Reasoning",question:"Country A imposed tariffs on steel imports. Domestic steel production increased by 20%. The trade minister credited the tariffs. Which would most strengthen this conclusion?",options:["Other countries also imposed tariffs.","Domestic steel prices remained the same during the period.","Demand for steel in other industries increased.","The global steel price decreased."],correctAnswer:1,explanation:"If prices stayed the same, the production increase can't be attributed to price changes — strengthening the tariff argument."},{id:lA(),type:"critical-reasoning",difficulty:"cat",source:`Based on logical reasoning patterns from R.S. Aggarwal's "A Modern Approach to Verbal & Non-Verbal Reasoning"`,question:'Statement: "No mammals lay eggs. The platypus lays eggs." What can be concluded?',options:["The platypus is a mammal.","The platypus is not a mammal, or the first statement is false.","All egg-layers are mammals.","Nothing can be concluded."],correctAnswer:1,explanation:"Since the platypus actually IS a mammal that lays eggs, the first statement must be false. The correct logical conclusion is that either the platypus is not a mammal OR the premise is false."},{id:lA(),type:"critical-reasoning",difficulty:"cat",source:'Modeled on CAT 2023 Critical Reasoning — "Strengthen/Weaken" type',question:"A city banned plastic bags. Six months later, plastic waste in its rivers decreased by 40%. Environmentalists credit the ban. Opponents argue the reduction is due to a new recycling plant opened the same month. Which investigation would best resolve this dispute?",options:["Survey residents about their plastic use.","Compare river plastic levels to a similar city that banned bags but didn't open a recycling plant.","Count how many stores comply with the ban.","Measure air quality."],correctAnswer:1,explanation:"A control city with the ban but no recycling plant isolates the ban's effect — the scientific method of controlled comparison."},{id:lA(),type:"vocabulary",difficulty:"cat",source:`Based on Norman Lewis's "Word Power Made Easy" — Goyal Publishers`,question:`Choose the pair completing: "The critic's review was ______ rather than analytical; it relied on ______ rather than evidence."`,options:["Subjective — facts","Diatribe — logic","Impressionistic — invective","Empirical — rhetoric"],correctAnswer:2,explanation:'"Impressionistic" = based on subjective impressions. "Invective" = abusive language. Both contrast with "analytical" and "evidence."'},{id:lA(),type:"vocabulary",difficulty:"cat",source:'Based on "Word Power Made Easy" by Norman Lewis',question:`"The CEO's ______ leadership, characterized by grandiose promises and minimal follow-through, eroded investor confidence."`,options:["Mercurial","Phlegmatic","Efficacious","Pusillanimous"],correctAnswer:0,explanation:'"Mercurial" = subject to sudden unpredictable changes — fits grandiose promises with no follow-through.'},{id:lA(),type:"vocabulary",difficulty:"cat",source:"Based on CAT 2017-2023 vocabulary patterns",question:`"The novel's protagonist is a study in contrasts — outwardly ______ yet inwardly tormented, publicly lionized yet privately ______."`,options:["Composed — revered","Tranquil — celebrated","Equable — anguished","Serene — extolled"],correctAnswer:2,explanation:'"Equable" (calm) contrasts "tormented," and "lionized" (praised) contrasts "anguished" (suffering).'},{id:lA(),type:"vocabulary",difficulty:"cat",source:'Based on "Word Power Made Easy" by Norman Lewis',question:'Choose the word that means "the practice of deliberately causing someone to delay doing something."',options:["Facilitation","Procrastination","Obfuscation","Precipitation"],correctAnswer:1,explanation:'"Procrastination" = the act of delaying or postponing action.'},{id:lA(),type:"vocabulary",difficulty:"cat",source:`Based on CAT vocabulary level from Arun Sharma's "How to Prepare for VARC for CAT"`,question:'"QUIXOTIC" means:',options:["Practical and realistic","Exceedingly idealistic and impractical","Cynical and pessimistic","Calm and composed"],correctAnswer:1,explanation:'"Quixotic" = exceedingly idealistic, unrealistic — from Don Quixote.'},{id:lA(),type:"vocabulary",difficulty:"cat",source:'Based on "Word Power Made Easy" by Norman Lewis',question:'Choose the antonym of "SYCOPHANT".',options:["Flatterer","Critically independent person","Follower","Admirer"],correctAnswer:1,explanation:'"Sycophant" = a person who flatters to gain advantage. Its opposite is someone critically independent.'},{id:lA(),type:"vocabulary",difficulty:"cat",source:"Based on Norman Lewis's vocabulary exercises",question:'"PROSCRIBE" means to:',options:["Prescribe medicine","Forbid, especially by law","Describe in detail","Write professionally"],correctAnswer:1,explanation:'"Proscribe" = to forbid, especially by law or authority. Not to be confused with "prescribe."'},{id:lA(),type:"vocabulary",difficulty:"cat",source:"Based on CAT 2019-2023 vocabulary question patterns",question:'Which word means "the ability to understand and share the feelings of another"?',options:["Apathy","Empathy","Sympathy","Telepathy"],correctAnswer:1,explanation:'"Empathy" = the ability to understand and share feelings of another. "Sympathy" = feelings of pity.'},{id:lA(),type:"vocabulary",difficulty:"cat",source:'Based on "Word Power Made Easy" by Norman Lewis',question:'Choose the synonym of "LOQUACIOUS".',options:["Reticent","Garrulous","Terse","Taciturn"],correctAnswer:1,explanation:'"Loquacious" and "garrulous" both mean very talkative.'},{id:lA(),type:"para-jumble",difficulty:"cat",source:"Modeled on CAT 2022 Para Jumble pattern",question:`Arrange:
A. The implications extend beyond academic interest.
B. Quantum computing threatens current encryption.
C. This could alter the cybersecurity landscape.
D. Governments race to develop quantum-resistant algorithms.
E. Digital privacy foundations hang in the balance.`,options:["B-A-C-E-D","B-C-A-E-D","A-B-C-D-E","B-C-D-A-E"],correctAnswer:0,explanation:"Threat (B) → significance (A) → consequence (C) → stakes (E) → response (D)."},{id:lA(),type:"para-jumble",difficulty:"cat",source:'Modeled on CAT 2020 Para Jumble — "Cause & Effect" type',question:`Arrange:
A. Climate change exacerbates existing social inequalities.
B. The poor, who contribute least to emissions, suffer most.
C. Rising sea levels displace coastal communities disproportionately.
D. This creates a vicious cycle of poverty and vulnerability.
E. Addressing climate change requires addressing justice.`,options:["A-B-C-D-E","C-B-A-D-E","A-C-B-D-E","B-C-A-D-E"],correctAnswer:0,explanation:"Theme (A) → specific example of the poor (B) → specific impact (C) → cycle (D) → conclusion (E)."},{id:lA(),type:"para-jumble",difficulty:"cat",source:`Based on para jumble patterns from Arun Sharma's "How to Prepare for VARC for CAT"`,question:`Arrange:
A. The human brain contains roughly 86 billion neurons.
B. Each neuron can form thousands of connections.
C. The resulting network is more complex than the Internet.
D. Understanding this complexity is neuroscience's greatest challenge.
E. Despite decades of research, we have barely scratched the surface.`,options:["A-B-C-D-E","B-A-C-D-E","A-C-B-D-E","D-A-B-C-E"],correctAnswer:0,explanation:"Neurons (A) → connections (B) → complexity (C) → challenge (D) → progress (E)."},{id:lA(),type:"para-jumble",difficulty:"cat",source:"Modeled on CAT 2021 Para Jumble pattern",question:`Arrange:
A. Ancient trade routes were arteries of cultural exchange.
B. The Silk Road connected China to the Mediterranean.
C. Along with silk and spices, ideas and religions traveled.
D. Buddhism reached China through these very routes.
E. These connections shaped civilizations in profound ways.`,options:["A-B-C-D-E","B-A-C-D-E","A-C-B-D-E","B-C-A-D-E"],correctAnswer:0,explanation:"Theme (A) → specific route (B) → what traveled (C) → specific example (D) → conclusion (E)."},{id:lA(),type:"sentence-correction",difficulty:"cat",source:`Based on grammar patterns from Wren & Martin's "High School English Grammar and Composition"`,question:"Which sentence is both grammatically and stylistically correct?",options:["Scarcely had he arrived when the meeting began.","Scarcely he had arrived when the meeting began.","Scarcely had he arrived than the meeting began.","Scarcely he arrived when the meeting began."],correctAnswer:0,explanation:'"Scarcely" triggers inversion: "Scarcely had he arrived" + "when" (not "than").'},{id:lA(),type:"sentence-correction",difficulty:"cat",source:"Based on Wren & Martin's grammar exercises",question:"Choose the correct sentence:",options:["The committee were divided in their opinions.","The committee was divided in its opinion.","The committee were divided in its opinion.","The committee was divided in their opinions."],correctAnswer:1,explanation:'"Committee" as a singular collective noun takes "was" and "its" when acting as a single body.'},{id:lA(),type:"sentence-correction",difficulty:"cat",source:"Based on CAT-level sentence correction patterns",question:"Which uses the conditional correctly?",options:["If she would have studied, she would have passed.","Had she studied, she would have passed.","If she had studied, she would pass.","Had she studied, she will pass."],correctAnswer:1,explanation:'Third conditional: "Had she studied" (inverted past perfect) + "would have passed."'},{id:lA(),type:"sentence-correction",difficulty:"cat",source:'Based on Wren & Martin — "Conjunctions & Clauses"',question:"Which sentence is correct?",options:["The reason he was late is because his car broke down.","The reason he was late is that his car broke down.","The reason why he was late is because his car broke down.","The reason he was late is due to his car broke down."],correctAnswer:1,explanation:`"The reason is..." should be followed by "that" (not "because" — that's redundant).`},{id:lA(),type:"fill-in-blanks",difficulty:"cat",source:"Modeled on CAT 2022 Fill-in-the-Blanks pattern",question:`"The politician's speech was long on rhetoric but short on ______, leaving voters unconvinced."`,options:["Substance","Oratory","Emotion","Volume"],correctAnswer:0,explanation:"The contrast is rhetoric vs. substance — speech was flashy but lacked real content."},{id:lA(),type:"fill-in-blanks",difficulty:"cat",source:'Based on vocabulary level from "How to Prepare for VARC for CAT" by Arun Sharma',question:`"The scientist's ______ approach to research, checking every data point three times, earned her the respect of peers."`,options:["Cavalier","Meticulous","Haphazard","Superficial"],correctAnswer:1,explanation:'"Meticulous" = showing great attention to detail — fits checking every data point three times.'},{id:lA(),type:"fill-in-blanks",difficulty:"cat",source:'Modeled on CAT 2023 Fill-in-the-Blanks — "Double Blanks"',question:`"The author's latest novel is a ______ exploration of grief — neither sentimental nor clinical, but deeply ______."`,options:["Maudlin — emotional","Nuanced — affecting","Superficial — moving","Pedantic — boring"],correctAnswer:1,explanation:'"Nuanced" = subtle, showing fine distinctions. "Affecting" = touching the emotions — fits neither sentimental nor clinical.'},{id:lA(),type:"fill-in-blanks",difficulty:"cat",source:"Based on CAT-level vocabulary-in-context questions",question:`"Despite the CEO's ______ about future growth, the company's financials told a more ______ story."`,options:["Optimism — sanguine","Lament — cheerful","Exuberance — sobering","Enthusiasm — exciting"],correctAnswer:2,explanation:'"Despite" signals contrast: exuberance (excitement) vs. sobering (serious/worrying) financials.'},{id:lA(),type:"fill-in-blanks",difficulty:"cat",source:`Inspired by passage style from Nishit Sinha's "VARC for CAT" — Pearson`,question:'"The philosopher argued that moral judgments are not objective truths but rather expressions of personal ______, a position known as ______."',options:["Values — relativism","Preference — emotivism","Facts — absolutism","Beliefs — realism"],correctAnswer:1,explanation:"Emotivism is the ethical theory that moral judgments express emotional attitudes (preferences), not objective facts."},{id:lA(),type:"grammar",difficulty:"cat",source:"Based on advanced grammar from Wren & Martin",question:"Which sentence uses the optative subjunctive?",options:["If I were king, things would be different.","Long live the King!","He insisted that she leave immediately.","Be that as it may."],correctAnswer:1,explanation:'The optative subjunctive expresses a wish: "Long live the King!" = "May the King live long."'},{id:lA(),type:"grammar",difficulty:"cat",source:"Based on CAT-level grammar patterns",question:"Identify the sentence with correct punctuation of a non-restrictive clause:",options:["My brother who lives in Mumbai is a doctor.","My brother, who lives in Mumbai, is a doctor.","My brother who lives in Mumbai, is a doctor.","My brother, who lives in Mumbai is a doctor."],correctAnswer:1,explanation:'Non-restrictive clauses need commas on both sides: ", who lives in Mumbai," — it adds info, not identifies which brother.'},{id:lA(),type:"rc",difficulty:"cat",source:'Modeled on CAT 2023 RC passage — "Existentialism & Ethics"',passage:`Existentialism, associated with thinkers like Sartre and Camus, emphasizes individual freedom and responsibility. Sartre's famous dictum "existence precedes essence" means humans are not born with a predetermined purpose — we define ourselves through our choices. This philosophy places enormous weight on individual decision-making: if there is no predetermined human nature, then every choice we make contributes to defining what it means to be human, not just for ourselves but as a model for all humanity.`,question:"According to Sartre's existentialism, our choices are significant because they:",options:["Only affect ourselves.","Determine our salary.","Define what it means to be human for all people.","Are predetermined by God."],correctAnswer:2,explanation:'"Every choice we make contributes to defining what it means to be human... as a model for all humanity."'},{id:lA(),type:"rc",difficulty:"cat",source:'Modeled on XAT 2022 RC passage — "Psychology & Decision Making"',passage:"Cognitive dissonance theory, developed by Leon Festinger, explains the mental discomfort experienced when holding two contradictory beliefs. To reduce this discomfort, people may change their beliefs, seek confirming information, or rationalize the contradiction. This has profound implications: smokers who know smoking causes cancer may convince themselves the evidence is flawed rather than quit. The theory suggests that humans are not rational truth-seekers but consistency-seekers, prioritizing psychological comfort over accuracy.",question:"The passage suggests that cognitive dissonance theory challenges the view that humans are:",options:["Emotional beings.","Rational truth-seekers.","Social animals.","Capable of change."],correctAnswer:1,explanation:'The passage contrasts "rational truth-seekers" with "consistency-seekers" — humans prioritize comfort over accuracy.'},{id:lA(),type:"rc",difficulty:"cat",source:'Modeled on IIFT 2021 RC passage — "Education & Social Justice"',passage:` Paulo Freire's "Pedagogy of the Oppressed" critiques what he calls the "banking model" of education, where teachers deposit information into passive students. Freire argues this model mirrors and reinforces oppressive social structures by treating students as empty vessels rather than active participants. He proposes instead a "problem-posing" education where teachers and students learn together through dialogue, treating knowledge as a collaborative construction rather than a commodity to be transferred.`,question:`Freire's critique of the "banking model" is that it:`,options:["Is too difficult for students.","Reinforces oppressive social structures.","Doesn't teach enough facts.","Is too expensive."],correctAnswer:1,explanation:'"Mirrors and reinforces oppressive social structures by treating students as empty vessels."'},{id:lA(),type:"critical-reasoning",difficulty:"cat",source:`Based on logical reasoning from R.S. Aggarwal's "Verbal & Non-Verbal Reasoning"`,question:`Statement: "If the battery is dead, the car won't start. The car won't start." Which conclusion is valid?`,options:["The battery is dead.","The battery might or might not be dead — other causes are possible.","The battery is not dead.","The car has no fuel."],correctAnswer:1,explanation:"Denying the consequent is a fallacy. The car might not start for reasons other than a dead battery."},{id:lA(),type:"critical-reasoning",difficulty:"cat",source:'Modeled on CAT Critical Reasoning — "Flaw in Argument" type',question:`Advertisement: "9 out of 10 dentists recommend FreshTooth toothpaste." The advertisement's claim is LEAST vulnerable to which criticism?`,options:["The sample size of dentists is unknown.","The dentists surveyed may have been paid.","The question may have been leading.","FreshTooth is the most popular brand."],correctAnswer:3,explanation:"Being the most popular brand doesn't undermine the statistic itself. The other options question the validity of the survey methodology."},{id:lA(),type:"critical-reasoning",difficulty:"cat",source:'Inspired by GMAT Critical Reasoning — "Evaluate Argument" type',question:"A town banned cell phone use while driving. Accidents decreased 25%. To evaluate whether the ban caused this decrease, it would be most useful to know:",options:["How many people own cell phones.","Whether accidents decreased in nearby towns without bans during the same period.","What brand of cell phones are most popular.","How many police officers patrol the roads."],correctAnswer:1,explanation:"A control group (nearby towns without bans) helps isolate the ban's effect from general trends."},{id:lA(),type:"vocabulary",difficulty:"cat",source:'Based on "Word Power Made Easy" by Norman Lewis',question:'Choose the word meaning "a false name used by an author".',options:["Pseudonym","Acronym","Synonym","Antonym"],correctAnswer:0,explanation:'"Pseudonym" = a fictitious name, especially used by an author. From Greek "pseudōnymos" = falsely named.'},{id:lA(),type:"vocabulary",difficulty:"cat",source:`Based on Norman Lewis's "Word Power Made Easy" — "Words for Personalities"`,question:'"A person who is habitually tardy or late" is described as:',options:["Punctual","Dilatory","Meticulous","Altruistic"],correctAnswer:1,explanation:'"Dilatory" = slow to act; intended to cause delay. A dilatory person is habitually late.'},{id:lA(),type:"vocabulary",difficulty:"cat",source:"Based on CAT-level word usage questions",question:'"EGREGIOUS" means:',options:["Outstandingly bad","Outstandingly good","Average","Subtle"],correctAnswer:0,explanation:'"Egregious" = outstandingly bad; shocking. (Originally meant "outstanding" in Latin, but evolved to mean outstandingly bad.)'},{id:lA(),type:"vocabulary",difficulty:"cat",source:'Based on "Word Power Made Easy" by Norman Lewis',question:'Which word means "the fear of open or public spaces"?',options:["Acrophobia","Agoraphobia","Claustrophobia","Arachnophobia"],correctAnswer:1,explanation:'"Agoraphobia" = fear of open/public spaces. From Greek "agora" = marketplace + "phobos" = fear.'},{id:lA(),type:"fill-in-blanks",difficulty:"cat",source:'Modeled on CAT 2019 Fill-in-the-Blanks — "Double Blanks"',question:'"The debate between determinism and free will has ______ philosophers for centuries, with no resolution in ______."',options:["Bored — hand","Consumed — sight","Eluded — mind","Perplexed — view"],correctAnswer:1,explanation:'"Consumed" = occupied obsessively. "N
